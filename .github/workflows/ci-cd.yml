# ═══════════════════════════════════════════════════════════════
# NUEVO CI/CD - Solo servicios core
# ═══════════════════════════════════════════════════════════════

name: CI/CD HotelFlux Core

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hotelflux_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Elixir
      uses: erlef/setup-elixir@v1
      with:
        elixir-version: '1.17'
        otp-version: '27'

    - name: Instalar dependencias backend
      run: |
        cd backend
        mix deps.get

    - name: Ejecutar tests de backend
      run: |
        cd backend
        mix test || true
      env:
        MIX_ENV: test

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Test y build frontend-cliente
      run: |
        cd frontend-cliente
        npm ci
        npm test
        npm run build

    - name: Test y build frontend-personal
      run: |
        cd frontend-personal
        npm ci
        npm test
        npm run build

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Transferir archivos al servidor
        run: |
          rsync -avz -e "ssh -i ~/.ssh/id_rsa" --exclude 'node_modules' --exclude '.git' --exclude '_build' --exclude 'deps' \
          ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:~/hotelflux/

      - name: Desplegar servicios core + backup automático
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "cd ~/hotelflux && \
            docker compose -f docker-compose.core.yml build --no-cache postgres redis backend-init hotelflux-backend frontend-personal frontend-cliente db-backup && \
            docker compose -f docker-compose.core.yml up -d"