# ═══════════════════════════════════════════════════════════
# HotelFlux — GitHub Actions CI/CD Pipeline
# Build → Test → Docker Push → Deploy
# ═══════════════════════════════════════════════════════════
name: HotelFlux CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.17"
  OTP_VERSION: "27"
  NODE_VERSION: "22"

jobs:
  # ── Backend: Elixir Tests ──────────────────────────────
  backend-test:
    name: "Backend — Elixir Tests"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hotelflux_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            backend/deps
            backend/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('backend/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run migrations
        run: mix ecto.setup
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/hotelflux_test
          REDIS_URL: redis://localhost:6379

      - name: Run tests
        run: mix test --cover
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/hotelflux_test
          REDIS_URL: redis://localhost:6379

      - name: Check formatting
        run: mix format --check-formatted

  # ── Frontend: React Build + Lint ───────────────────────
  frontend-build:
    name: "Frontend — Build & Lint"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend-reception

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-reception/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Docker: Build & Push ───────────────────────────────
  docker-build:
    name: "Docker — Build Images"
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-reception
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy: Docker Compose ─────────────────────────────
  deploy:
    name: "Deploy — Docker Compose"
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Docker Compose
        run: |
          echo "🏨 Deploying HotelFlux..."
          docker compose -f docker-compose.yml up -d --build
          echo "✅ HotelFlux deployed successfully"
