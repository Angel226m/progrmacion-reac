# ═══════════════════════════════════════════════════════════
# HotelFlux — Docker Compose (DESARROLLO LOCAL)
# Servicios: PostgreSQL, Redis, Backend Elixir, Frontend React, Nginx
# Uso: docker compose up -d
# ═══════════════════════════════════════════════════════════

services:
  # ── PostgreSQL 18 ──
  postgres:
    image: postgres:18-alpine
    container_name: hotelflux_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hotelflux
      POSTGRES_PASSWORD: hotelflux_dev_2026
      POSTGRES_DB: hotelflux_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotelflux"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - hotelflux

  # ── Redis 8 ──
  redis:
    image: redis:8-alpine
    container_name: hotelflux_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - hotelflux

  # ── Backend Elixir/Phoenix ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotelflux_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ecto://hotelflux:hotelflux_dev_2026@postgres:5432/hotelflux_dev
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY_BASE: super_secret_key_base_min_64_chars_long_for_hotelflux_production_2026
      GUARDIAN_SECRET: guardian_jwt_secret_hotelflux_2026_funcional_reactiva
      PHX_HOST: localhost
      PORT: "4000"
      MIX_ENV: prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - hotelflux

  # ── Frontend React (Vite build → Nginx serve) ──
  frontend:
    build:
      context: ./frontend-reception
      dockerfile: Dockerfile
    container_name: hotelflux_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - hotelflux

  # ── Nginx (reverse proxy + WebSocket + rate limiting) ──
  nginx:
    image: nginx:alpine
    container_name: hotelflux_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - hotelflux

  # ── Prometheus (métricas) ──
  prometheus:
    image: prom/prometheus:latest
    container_name: hotelflux_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    ports:
      - "9090:9090"
    networks:
      - hotelflux

  # ── Grafana (dashboards) ──
  grafana:
    image: grafana/grafana:latest
    container_name: hotelflux_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - hotelflux

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  hotelflux:
    driver: bridge
