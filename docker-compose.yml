# ═══════════════════════════════════════════════════════════
# HotelFlux — Docker Compose (DESARROLLO LOCAL) v3
# OWASP DevSecOps: no-new-privileges, security_opt, read-only
# Servicios: PostgreSQL, Redis, Backend, Frontend, Nginx,
#            Prometheus, Grafana, Loki, Promtail, Exporters
# Uso: docker compose up -d
# ═══════════════════════════════════════════════════════════

services:

  # ── PostgreSQL 18 ──────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: hotelflux_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hotelflux
      POSTGRES_PASSWORD: hotelflux_dev_2026
      POSTGRES_DB: hotelflux_dev
      # Seguridad: evitar conexiones de superusuario
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotelflux -d hotelflux_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - hotelflux

  # ── Redis 8 ────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: hotelflux_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --protected-mode no
      --loglevel warning
      --save ""
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - hotelflux

  # ── Backend Elixir/Phoenix ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotelflux_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL:    ecto://hotelflux:hotelflux_dev_2026@postgres:5432/hotelflux_dev
      REDIS_URL:       redis://redis:6379/0
      SECRET_KEY_BASE: super_secret_key_base_min_64_chars_long_for_hotelflux_production_2026
      GUARDIAN_SECRET: guardian_jwt_secret_hotelflux_2026_funcional_reactiva
      PHX_HOST:        localhost
      PORT:            "4000"
      MIX_ENV:         prod
      # OWASP: no enviar info de stack en producción
      RELEASE_COOKIE:  hotelflux_erlang_cookie_2026
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
        labels: "service,environment"
    labels:
      com.hotelflux.service: "backend"
      com.hotelflux.environment: "production"
    networks:
      - hotelflux

  # ── Frontend React (Vite → Nginx) ──────────────────────
  frontend:
    build:
      context: ./frontend-reception
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_URL: /api/v1
        VITE_WS_URL: ws://localhost/socket
    container_name: hotelflux_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=32m
      - /var/run:size=4m
      - /tmp:size=16m
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
        labels: "service"
    labels:
      com.hotelflux.service: "frontend"
    networks:
      - hotelflux

  # ── Nginx (reverse proxy + TLS-ready + rate limiting) ──
  nginx:
    image: nginx:1.27-alpine
    container_name: hotelflux_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=64m
      - /var/run:size=4m
      - /tmp:size=16m
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service"
    labels:
      com.hotelflux.service: "nginx"
    networks:
      - hotelflux

  # ── Prometheus (métricas) ───────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: hotelflux_prometheus
    restart: unless-stopped
    user: "65534:65534"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--storage.tsdb.min-block-duration=2h'
      - '--storage.tsdb.max-block-duration=2h'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./infra/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - hotelflux

  # ── Grafana (dashboards) ────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: hotelflux_grafana
    restart: unless-stopped
    user: "472:472"
    environment:
      GF_SECURITY_ADMIN_USER:              admin
      GF_SECURITY_ADMIN_PASSWORD:          HotelFlux2026!
      GF_USERS_ALLOW_SIGN_UP:              "false"
      GF_USERS_ALLOW_ORG_CREATE:           "false"
      GF_AUTH_ANONYMOUS_ENABLED:           "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/hotelflux-hotel.json
      GF_LOG_LEVEL:                        warn
      GF_LOG_MODE:                         console
      # Seguridad adicional
      GF_SECURITY_DISABLE_GRAVATAR:        "true"
      GF_SECURITY_COOKIE_SECURE:           "false"   # true en HTTPS
      GF_SECURITY_COOKIE_SAMESITE:         strict
      GF_SECURITY_CONTENT_TYPE_PROTECTION: "true"
      GF_SECURITY_X_FRAME_OPTIONS:         DENY
      GF_SECURITY_X_XSS_PROTECTION:        "1; mode=block"
      # Analytics off
      GF_ANALYTICS_REPORTING_ENABLED:      "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES:      "false"
      # Snapshots deshabilitados
      GF_SNAPSHOTS_EXTERNAL_ENABLED:       "false"
    ports:
      - "3001:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - hotelflux

  # ── Loki (agregación de logs) ───────────────────────────
  loki:
    image: grafana/loki:3.1.0
    container_name: hotelflux_loki
    restart: unless-stopped
    user: "10001:10001"
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - hotelflux

  # ── Promtail (recolector de logs → Loki) ───────────────
  promtail:
    image: grafana/promtail:3.1.0
    container_name: hotelflux_promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - hotelflux

  # ── PostgreSQL Exporter ─────────────────────────────────
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: hotelflux_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://hotelflux:hotelflux_dev_2026@postgres:5432/hotelflux_dev?sslmode=disable"
      # Solo exponer métricas de la BD de la aplicación
      PG_EXPORTER_EXCLUDE_DATABASES: "template0,template1"
      PG_EXPORTER_INCLUDE_DATABASES: "hotelflux_dev"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - hotelflux

  # ── Redis Exporter ──────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: hotelflux_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      - redis
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - hotelflux

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  prometheusdata:
    driver: local
  grafanadata:
    driver: local
  lokidata:
    driver: local

networks:
  hotelflux:
    driver: bridge
