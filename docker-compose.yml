# ═══════════════════════════════════════════════════════════
# HotelFlux — Docker Compose (DESARROLLO LOCAL) v4
# OWASP DevSecOps: no-new-privileges, security_opt, read-only,
#                  usuarios no-root, tini (PID 1), profiles
# Servicios: PostgreSQL, Redis, Backend (con init migrator),
#            Frontend (cliente + personal), Nginx,
#            Prometheus, Grafana, Loki, Promtail, Exporters
#
# Profiles:
#   (default)   → core (postgres, redis, backend, frontend, nginx)
#   obs         → observabilidad (prometheus, grafana, loki, promtail, exporters)
#   tooling     → herramientas auxiliares
#
# Uso:
#   docker compose --profile default up -d
#   docker compose --profile default --profile obs up -d
#   docker compose ps
# ═══════════════════════════════════════════════════════════

name: hotelflux-dev

x-restart: &restart_policy
  restart: unless-stopped

x-logging: &logging_defaults
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    labels: "service,environment"

x-security: &security_defaults
  security_opt:
    - no-new-privileges:true
  init: true

services:

  # ── PostgreSQL 18 ──────────────────────────────────────
  postgres:
    <<: [*restart_policy, *security_defaults]
    image: postgres:18-alpine
    container_name: hotelflux_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hotelflux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Debe definir POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:-hotelflux_dev}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - pgconf:/etc/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotelflux} -d ${POSTGRES_DB:-hotelflux_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging: *logging_defaults
    labels:
      com.hotelflux.service: "postgres"
      com.hotelflux.environment: "development"
    networks:
      - hotelflux

  # ── Redis 8 ────────────────────────────────────────────
  redis:
    <<: [*restart_policy, *security_defaults]
    image: redis:8-alpine
    container_name: hotelflux_redis
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --protected-mode yes
      --requirepass ${REDIS_PASSWORD:?Debe definir REDIS_PASSWORD en .env}
      --loglevel warning
      --save ""
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Debe definir REDIS_PASSWORD en .env}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    logging: *logging_defaults
    labels:
      com.hotelflux.service: "redis"
      com.hotelflux.environment: "development"
    networks:
      - hotelflux

  # ── Backend init: corre migraciones + seeds automáticamente (one-shot) ──
  # Se ejecuta en cada `docker compose up` antes de levantar `backend`.
  # El seed es idempotente (chequea count + on_conflict: :nothing), así que
  # re-ejecutarlo sobre una BD ya sembrada no duplica datos.
  backend-init:
    <<: [*restart_policy, *security_defaults]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: hotelflux_backend_init
    command:
      - sh
      - -c
      - "./bin/hotelflux eval 'HotelFlux.Release.migrate()' && ./bin/hotelflux eval 'HotelFlux.Release.seed()'"
    environment:
      DATABASE_URL:    ecto://${POSTGRES_USER:-hotelflux}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hotelflux_dev}
      REDIS_URL:       redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Debe definir SECRET_KEY_BASE en .env (min 64 chars)}
      GUARDIAN_SECRET: ${GUARDIAN_SECRET:?Debe definir GUARDIAN_SECRET en .env}
      MIX_ENV:         prod
      RELEASE_COOKIE:  ${RELEASE_COOKIE:?Debe definir RELEASE_COOKIE en .env}
      PHX_HOST:        ${PHX_HOST:-localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: "no"
    logging: *logging_defaults
    networks:
      - hotelflux

  # ── Backend Elixir/Phoenix ──────────────────────────────
  backend:
    <<: [*restart_policy, *security_defaults]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: hotelflux_backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL:    ecto://${POSTGRES_USER:-hotelflux}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hotelflux_dev}
      REDIS_URL:       redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Debe definir SECRET_KEY_BASE en .env (min 64 chars)}
      GUARDIAN_SECRET: ${GUARDIAN_SECRET:?Debe definir GUARDIAN_SECRET en .env}
      PHX_HOST:        ${PHX_HOST:-localhost}
      PORT:            "4000"
      MIX_ENV:         prod
      RELEASE_COOKIE:  ${RELEASE_COOKIE:?Debe definir RELEASE_COOKIE en .env}
      POOL_SIZE:       "10"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
    logging: *logging_defaults
    labels:
      com.hotelflux.service: "backend"
      com.hotelflux.environment: "development"
    networks:
      - hotelflux

  # ── Frontend Cliente React (Vite → Nginx unprivileged) ──
  frontend-cliente:
    <<: [*restart_policy, *security_defaults]
    build:
      context: ./frontend-cliente
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_URL: /api/v1
        VITE_WS_URL: /socket
    container_name: hotelflux_frontend_cliente
    ports:
      - "3001:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 32M
    logging: *logging_defaults
    labels:
      com.hotelflux.service: "frontend-cliente"
      com.hotelflux.environment: "development"
    networks:
      - hotelflux

  # ── Frontend Personal (Vite → Nginx unprivileged) ──────
  frontend-personal:
    <<: [*restart_policy, *security_defaults]
    build:
      context: ./frontend-personal
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_URL: /api/v1
        VITE_WS_URL: /socket
    container_name: hotelflux_frontend_personal
    ports:
      - "3003:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 32M
    logging: *logging_defaults
    labels:
      com.hotelflux.service: "frontend-personal"
      com.hotelflux.environment: "development"
    networks:
      - hotelflux

  # ── Nginx (reverse proxy + WebSocket + TLS-ready) ──────
  nginx:
    <<: [*restart_policy, *security_defaults]
    image: nginx:1.27-alpine
    container_name: hotelflux_nginx
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend-cliente:
        condition: service_healthy
      frontend-personal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/nginx_status"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging: *logging_defaults
    labels:
      com.hotelflux.service: "nginx"
      com.hotelflux.environment: "development"
    networks:
      - hotelflux

  # ── Prometheus (métricas) — profile: obs ───────────────
  prometheus:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: prom/prometheus:v2.52.0
    container_name: hotelflux_prometheus
    user: "65534:65534"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.min-block-duration=2h'
      - '--storage.tsdb.max-block-duration=2h'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./infra/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging: *logging_defaults
    networks:
      - hotelflux

  # ── Grafana (dashboards) — profile: obs ────────────────
  grafana:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: grafana/grafana:11.1.0
    container_name: hotelflux_grafana
    user: "472:472"
    environment:
      GF_SECURITY_ADMIN_USER:              ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD:          ${GF_ADMIN_PASSWORD:?Debe definir GF_ADMIN_PASSWORD en .env}
      GF_USERS_ALLOW_SIGN_UP:              "false"
      GF_USERS_ALLOW_ORG_CREATE:           "false"
      GF_AUTH_ANONYMOUS_ENABLED:           "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/hotelflux-hotel.json
      GF_LOG_LEVEL:                        warn
      GF_LOG_MODE:                         console
      GF_SECURITY_DISABLE_GRAVATAR:        "true"
      GF_SECURITY_COOKIE_SECURE:           "false"
      GF_SECURITY_COOKIE_SAMESITE:         strict
      GF_SECURITY_CONTENT_TYPE_PROTECTION: "true"
      GF_SECURITY_X_FRAME_OPTIONS:         DENY
      GF_SECURITY_X_XSS_PROTECTION:        "1; mode=block"
      GF_ANALYTICS_REPORTING_ENABLED:      "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES:      "false"
      GF_SNAPSHOTS_EXTERNAL_ENABLED:       "false"
    ports:
      - "3002:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    logging: *logging_defaults
    networks:
      - hotelflux

  # ── Loki (logs) — profile: obs ─────────────────────────
  loki:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: grafana/loki:3.1.0
    container_name: hotelflux_loki
    user: "10001:10001"
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - lokidata:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 64M
    logging: *logging_defaults
    networks:
      - hotelflux

  # ── Promtail (log shipper) — profile: obs ──────────────
  promtail:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: grafana/promtail:3.1.0
    container_name: hotelflux_promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *logging_defaults
    networks:
      - hotelflux

  # ── PostgreSQL Exporter — profile: obs ─────────────────
  postgres-exporter:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
    container_name: hotelflux_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-hotelflux}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hotelflux_dev}?sslmode=disable"
      PG_EXPORTER_EXCLUDE_DATABASES: "template0,template1"
      PG_EXPORTER_INCLUDE_DATABASES: "${POSTGRES_DB:-hotelflux_dev}"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    logging: *logging_defaults
    networks:
      - hotelflux

  # ── Redis Exporter — profile: obs ──────────────────────
  redis-exporter:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: oliver006/redis_exporter:v1.61.0
    container_name: hotelflux_redis_exporter
    environment:
      REDIS_ADDR: "redis://:${REDIS_PASSWORD}@redis:6379"
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    logging: *logging_defaults
    networks:
      - hotelflux

  # ── Nginx Prometheus Exporter — profile: obs ───────────
  nginx-exporter:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: hotelflux_nginx_exporter
    command:
      - --nginx.scrape-uri=http://nginx:80/nginx_status
    depends_on:
      - nginx
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.1"
    logging: *logging_defaults
    networks:
      - hotelflux

volumes:
  pgdata:
    driver: local
  pgconf:
    driver: local
  redisdata:
    driver: local
  prometheusdata:
    driver: local
  grafanadata:
    driver: local
  lokidata:
    driver: local

networks:
  hotelflux:
    driver: bridge
    name: hotelflux
