# ═══════════════════════════════════════════════════════════
# HotelFlux — Grafana Dashboard Provisioning
# Auto-carga dashboards desde archivos JSON
# ═══════════════════════════════════════════════════════════

apiVersion: 1

providers:
  - name: 'HotelFlux Dashboards'
    orgId: 1
    folder: 'HotelFlux'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
