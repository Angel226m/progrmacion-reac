# ═══════════════════════════════════════════════════════════════════
# HotelFlux — Grafana Dashboard Provisioning v3
# Dashboards organizados por folder con auto-actualización
# ═══════════════════════════════════════════════════════════════════

apiVersion: 1

providers:

  # ── Sistema e Infraestructura ─────────────────────────────────
  - name: 'HotelFlux - Infraestructura'
    orgId: 1
    folder: 'HotelFlux / Infraestructura'
    folderUid: 'hotelflux-folder-infra'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/infra
      foldersFromFilesStructure: false

  # ── Hotel / Negocio ──────────────────────────────────────────
  - name: 'HotelFlux - Negocio'
    orgId: 1
    folder: 'HotelFlux / Negocio'
    folderUid: 'hotelflux-folder-business'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/business
      foldersFromFilesStructure: false

  # ── Logs y Seguridad ─────────────────────────────────────────
  - name: 'HotelFlux - Logs & Seguridad'
    orgId: 1
    folder: 'HotelFlux / Logs & Seguridad'
    folderUid: 'hotelflux-folder-security'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/security
      foldersFromFilesStructure: false
