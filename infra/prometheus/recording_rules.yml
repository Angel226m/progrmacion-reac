# ═══════════════════════════════════════════════════════════════════
# HotelFlux — Recording Rules (métricas pre-agregadas)
# ═══════════════════════════════════════════════════════════════════

groups:
  - name: hotelflux_recording
    interval: 60s
    rules:

      # ── Ocupación promedio por hora (última 1h) ──
      - record: hotelflux:occupancy_rate_avg_1h
        expr: avg_over_time(hotelflux_occupancy_rate_percent[1h])

      # ── Ocupación promedio por día ──
      - record: hotelflux:occupancy_rate_avg_24h
        expr: avg_over_time(hotelflux_occupancy_rate_percent[24h])

      # ── Ingresos del día (en centavos) ──
      - record: hotelflux:revenue_today
        expr: hotelflux_revenue_today_cents

      # ── Ingresos del mes (en centavos) ──
      - record: hotelflux:revenue_month
        expr: hotelflux_revenue_month_cents

      # ── RevPAR: Revenue Per Available Room ──
      - record: hotelflux:revpar_cents
        expr: hotelflux_revenue_today_cents / (hotelflux_rooms_total > 0)

      # ── ADR: Average Daily Rate ──
      - record: hotelflux:adr_cents
        expr: hotelflux_revenue_today_cents / (hotelflux_rooms_by_state{state="ocupada"} > 0)

      # ── Check-ins rate (últimos 30 min) ──
      - record: hotelflux:checkins_rate_30m
        expr: rate(hotelflux_checkins_today[30m])

      # ── Check-outs rate (últimos 30 min) ──
      - record: hotelflux:checkouts_rate_30m
        expr: rate(hotelflux_checkouts_today[30m])

      # ── Proporción de ocupación ──
      - record: hotelflux:occupancy_ratio
        expr: hotelflux_rooms_by_state{state="ocupada"} / (hotelflux_rooms_total > 0)

      # ── Tasa de completación limpieza (última 1h) ──
      - record: hotelflux:cleaning_completion_rate_1h
        expr: rate(hotelflux_cleaning_tasks_completed_today[1h])

      # ── Disponibilidad total ──
      - record: hotelflux:rooms_available_total
        expr: hotelflux_rooms_by_state{state="disponible"} + hotelflux_rooms_by_state{state="reservada"}
