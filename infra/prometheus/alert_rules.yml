# ═══════════════════════════════════════════════════════════════════
# HotelFlux — Alertas Prometheus (OWASP A09 / ISO 27001 A.12.4)
# ═══════════════════════════════════════════════════════════════════

groups:
  - name: hotelflux_alerts
    interval: 30s
    rules:

      # ── Backend caído ──
      - alert: BackendDown
        expr: hotelflux_up == 0
        for: 30s
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Backend HotelFlux no responde"
          description: "El backend Phoenix ha estado caído por más de 30s."

      # ── Alta ocupación de memoria ──
      - alert: HighMemoryUsage
        expr: hotelflux_erlang_memory_bytes{type="total"} / 1024 / 1024 > 800
        for: 2m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Uso de memoria superior a 800MB"
          description: "La VM Erlang está usando {{ $value | humanize1024 }}B de memoria."

      # ── Run queue elevado (saturación) ──
      - alert: HighRunQueue
        expr: hotelflux_erlang_run_queue > 100
        for: 1m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Run queue elevado ({{ $value }})"
          description: "La cola de ejecución de Erlang está en {{ $value }} — posible saturación."

      # ── Ocupación crítica del hotel ──
      - alert: CriticalOccupancy
        expr: hotelflux_occupancy_rate_percent > 95
        for: 5m
        labels:
          severity: info
          team: recepcion
        annotations:
          summary: "Hotel al {{ $value }}% de ocupación"
          description: "La ocupación ha superado el 95%. Preparar asignación de recursos."

      # ── Ocupación muy baja ──
      - alert: LowOccupancy
        expr: hotelflux_occupancy_rate_percent < 30
        for: 30m
        labels:
          severity: info
          team: marketing
        annotations:
          summary: "Ocupación baja ({{ $value }}%)"
          description: "La ocupación está por debajo del 30% — considerar promociones."

      # ── Tareas de limpieza acumuladas ──
      - alert: CleaningBacklog
        expr: hotelflux_cleaning_tasks_pending > 10
        for: 5m
        labels:
          severity: warning
          team: limpieza
        annotations:
          summary: "{{ $value }} tareas de limpieza pendientes"
          description: "Hay más de 10 tareas de limpieza sin asignar."

      # ── Check-ins pendientes ──
      - alert: PendingCheckins
        expr: hotelflux_checkins_pending_today > 5
        for: 2m
        labels:
          severity: info
          team: recepcion
        annotations:
          summary: "{{ $value }} check-ins pendientes hoy"
          description: "Hay huéspedes esperando check-in."

      # ── Sin ingresos en el día (posible fallo) ──
      - alert: NoRevenueToday
        expr: hotelflux_revenue_today_cents == 0 and hotelflux_uptime_seconds > 3600
        for: 30m
        labels:
          severity: warning
          team: admin
        annotations:
          summary: "Sin ingresos registrados hoy"
          description: "No se han registrado ingresos en las últimas 24h — posible fallo en pagos."

      # ── Tasa de error HTTP elevada ──
      - alert: HighErrorRate
        expr: rate(hotelflux_http_errors_total[5m]) / rate(hotelflux_http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Tasa de error HTTP del {{ printf \"%.1f\" $value | humanizePercentage }}"
          description: "La tasa de error 5xx supera el 5% en los últimos 5 minutos."

      # ── Latencia p95 elevada ──
      - alert: HighLatency
        expr: hotelflux_http_p95_duration_ms > 2000
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Latencia p95 de {{ $value }}ms"
          description: "La latencia p95 supera los 2000ms — posible degradación."

      # ── Prometheus caído ──
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 30s
        labels:
          severity: critical
          team: infra
        annotations:
          summary: "Prometheus no responde"
          description: "El servidor Prometheus ha caído."
