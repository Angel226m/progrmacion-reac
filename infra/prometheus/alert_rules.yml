# ═══════════════════════════════════════════════════════════════════
# HotelFlux — Alert Rules v5
# Severidades: critical > warning > info
# Grupos: backend | hotel | infra | nginx | slo | security | predictive
# ISO 27001 A.12.4 / A.16 — Security Logging & Incident Response
# ═══════════════════════════════════════════════════════════════════

groups:

  # ── Backend / Disponibilidad ────────────────────────────────────
  - name: hotelflux_backend
    interval: 15s
    rules:

      - alert: BackendDown
        expr: up{job="hotelflux_backend"} == 0
        for: 1m
        labels:
          severity: critical
          service:  backend
          team:     ops
        annotations:
          summary:     "🔴 Backend HotelFlux CAÍDO"
          description: >
            El backend Phoenix no responde en {{ $labels.instance }}
            desde hace >1min. Verificar: `docker logs hotelflux_backend` y
            `docker compose ps backend`.
          runbook_url: "https://wiki.hotelflux.dev/runbooks/backend-down"

      - alert: BackendHighMemory
        expr: hotelflux_erlang_memory_bytes{type="total"} > 768 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
          service:  backend
        annotations:
          summary:     "⚠️ Backend RAM >768MB"
          description: "Erlang VM total: {{ $value | humanize1024 }}B. Revisar memory leaks."

      - alert: BackendCriticalMemory
        expr: hotelflux_erlang_memory_bytes{type="total"} > 1.4 * 1024 * 1024 * 1024
        for: 2m
        labels:
          severity: critical
          service:  backend
        annotations:
          summary:     "🔴 Backend RAM CRÍTICA >1.4GB"
          description: "Erlang VM: {{ $value | humanize1024 }}B. Riesgo OOM inminente."

      - alert: BackendProcessSpike
        expr: hotelflux_erlang_process_count > 50000
        for: 5m
        labels:
          severity: warning
          service:  backend
        annotations:
          summary:     "⚠️ Procesos Erlang elevados ({{ $value }})"
          description: "Process count >50k. Revisar process leaks o queries bloqueantes."

      - alert: BackendRunQueueHigh
        expr: hotelflux_erlang_run_queue > 100
        for: 3m
        labels:
          severity: warning
          service:  backend
        annotations:
          summary:     "⚠️ Run Queue Erlang alta ({{ $value }})"
          description: "CPU saturada. Run queue >100 indica scheduler bloqueado."

      - alert: BackendMemoryTrendUp
        expr: predict_linear(hotelflux_erlang_memory_bytes{type="total"}[1h], 86400) > 1.5 * 1024 * 1024 * 1024
        for: 30m
        labels:
          severity: warning
          service:  backend
        annotations:
          summary:     "⚠️ Tendencia RAM: OOM en 24h si continúa así"
          description: "Proyección: {{ $value | humanize1024 }}B en 24h. Investigar fuga."

  # ── KPIs de Hotel / Negocio ────────────────────────────────────
  - name: hotelflux_hotel
    interval: 60s
    rules:

      - alert: AllRoomsFull
        expr: hotelflux_rooms_by_state{state="disponible"} == 0
        for: 10m
        labels:
          severity: info
          service:  hotel
        annotations:
          summary:     "ℹ️ Hotel 100% ocupado"
          description: "Sin habitaciones disponibles. Revisar check-outs pendientes."

      - alert: HighOccupancyRate
        expr: hotelflux_occupancy_rate_percent > 90
        for: 30m
        labels:
          severity: info
          service:  hotel
        annotations:
          summary:     "ℹ️ Ocupación >90%"
          description: "Considerar lista de espera o ajuste dinámico de precios."

      - alert: LowOccupancyRate
        expr: hotelflux_occupancy_rate_percent < 20
        for: 1h
        labels:
          severity: info
          service:  hotel
        annotations:
          summary:     "ℹ️ Ocupación <20% sostenida"
          description: "Revisar campañas de marketing o ajuste de tarifas."

      - alert: CleaningBacklog
        expr: hotelflux_cleaning_tasks_pending > 5
        for: 20m
        labels:
          severity: warning
          service:  hotel
        annotations:
          summary:     "⚠️ {{ $value }} limpiezas pendientes"
          description: "Backlog de limpieza. Afecta disponibilidad de habitaciones."

      - alert: CleaningSLABreach
        expr: hotelflux_cleaning_avg_duration_minutes > 45
        for: 30m
        labels:
          severity: warning
          service:  hotel
        annotations:
          summary:     "⚠️ Tiempo limpieza promedio >45min"
          description: "SLA de limpieza incumplido. Revisar personal/procedimientos."

      - alert: NoRevenueToday
        expr: hotelflux_revenue_today_cents == 0
        for: 4h
        labels:
          severity: warning
          service:  hotel
        annotations:
          summary:     "⚠️ Sin ingresos en 4h"
          description: "No se procesaron pagos. Verificar sistema de pagos."

      - alert: RevenueDrop
        expr: hotelflux_revenue_today_cents / (hotelflux_revenue_yesterday_cents + 1) < 0.5
        for: 2h
        labels:
          severity: warning
          service:  hotel
        annotations:
          summary:     "⚠️ Ingresos hoy <50% vs ayer"
          description: "Caída significativa de ingresos. Investigar causa."

      - alert: NoNewReservations
        expr: increase(hotelflux_reservations_created_total[6h]) == 0
        for: 6h
        labels:
          severity: warning
          service:  hotel
        annotations:
          summary:     "⚠️ Sin nuevas reservas en 6h"
          description: "Cero reservas creadas. Posible problema en motor de reservas."

      - alert: HighCancellationRate
        expr: hotelflux_reservations_cancelled_today > 5
        for: 30m
        labels:
          severity: warning
          service:  hotel
        annotations:
          summary:     "⚠️ {{ $value }} cancelaciones hoy"
          description: "Alta tasa de cancelación. Revisar causas."

  # ── Infraestructura ────────────────────────────────────────────
  - name: hotelflux_infrastructure
    interval: 30s
    rules:

      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 30s
        labels:
          severity: critical
          service:  postgres
          team:     ops
        annotations:
          summary:     "🔴 PostgreSQL NO DISPONIBLE"
          description: "BD puede estar caída. Verificar: `docker logs hotelflux_postgres`."

      - alert: PostgresHighConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
          service:  postgres
        annotations:
          summary:     "⚠️ PostgreSQL: {{ $value }} conexiones activas"
          description: "Límite 100. Revisar pool de Ecto en Phoenix y conexiones idle."

      - alert: PostgresQueryLongRunning
        expr: pg_stat_activity_max_tx_duration > 300
        for: 2m
        labels:
          severity: warning
          service:  postgres
        annotations:
          summary:     "⚠️ Query PostgreSQL >5min"
          description: "Posible query bloqueante. Revisar pg_stat_activity."

      - alert: PostgresDatabaseGrowing
        expr: predict_linear(pg_database_size_bytes{datname=~".*hotelflux.*"}[7d], 86400*30) > 10 * 1024 * 1024 * 1024
        for: 1h
        labels:
          severity: warning
          service:  postgres
        annotations:
          summary:     "⚠️ BD creciendo — proyectado >10GB en 30d"
          description: "Tamaño actual: {{ $value | humanize1024 }}B. Archivado necesario."

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          service:  redis
          team:     ops
        annotations:
          summary:     "🔴 Redis NO DISPONIBLE"
          description: "Afecta sesiones JWT, caché, rate limiting y Oban jobs."

      - alert: RedisHighMemory
        expr: hotelflux:redis_memory_usage_pct > 85
        for: 5m
        labels:
          severity: warning
          service:  redis
        annotations:
          summary:     "⚠️ Redis >85% de 128MB"
          description: "Política de evicción actual: allkeys-lru. Revisar keyspace."

      - alert: RedisLowHitRatio
        expr: hotelflux:redis_hit_ratio_pct < 50
        for: 10m
        labels:
          severity: warning
          service:  redis
        annotations:
          summary:     "⚠️ Redis hit ratio <50%"
          description: "Caché poco efectivo. Revisar TTLs y patrones de acceso."

      - alert: HighContainerRestartRate
        expr: rate(container_restart_count[30m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service:  platform
        annotations:
          summary:     "⚠️ Contenedor reiniciando ({{ $labels.name }})"
          description: "Tasa de reinicios elevada. Posible crash-loop."

      - alert: DiskSpacePredict
        expr: predict_linear(node_filesystem_avail_bytes{mountpoint="/data"}[6h], 86400*7) < 0
        for: 1h
        labels:
          severity: critical
          service:  platform
        annotations:
          summary:     "🔴 Disco lleno en 7d según tendencia"
          description: "Proyección: quedan <7 días de almacenamiento en {{ $labels.device }}."

      - alert: CpuHigh
        expr: (1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100 > 85
        for: 10m
        labels:
          severity: warning
          service:  platform
        annotations:
          summary:     "⚠️ CPU host >85% ({{ $value | humanizePercentage }})"
          description: "Host {{ $labels.instance }} con CPU alta sostenida."

  # ── Nginx / Proxy ─────────────────────────────────────────────
  - name: hotelflux_nginx
    interval: 15s
    rules:

      - alert: NginxDown
        expr: up{job="nginx"} == 0
        for: 30s
        labels:
          severity: critical
          service:  nginx
          team:     ops
        annotations:
          summary:     "🔴 Nginx NO DISPONIBLE"
          description: "El proxy inverso no responde. Toda la app caída."

      - alert: NginxHighConnections
        expr: nginx_connections_active > 500
        for: 5m
        labels:
          severity: warning
          service:  nginx
        annotations:
          summary:     "⚠️ Nginx: {{ $value }} conexiones activas"
          description: "Alto tráfico simultáneo. Revisar límites worker_connections."

      - alert: Nginx5xxSpike
        expr: rate(nginx_http_requests_total{status=~"5.."}[5m]) > 10
        for: 2m
        labels:
          severity: critical
          service:  nginx
        annotations:
          summary:     "🔴 Nginx 5xx elevados ({{ $value | humanize }}/s)"
          description: "Pico de errores 5xx. Backend puede estar fallando."

      - alert: Nginx4xxHigh
        expr: rate(nginx_http_requests_total{status=~"4.."}[5m]) > 100
        for: 5m
        labels:
          severity: warning
          service:  nginx
        annotations:
          summary:     "⚠️ Nginx 4xx elevados ({{ $value | humanize }}/s)"
          description: "Posible scraper o ataque. Revisar access logs."

      - alert: NginxConnectionDropped
        expr: nginx_connections_accepted - nginx_connections_handled > 10
        for: 5m
        labels:
          severity: warning
          service:  nginx
        annotations:
          summary:     "⚠️ Conexiones no manejadas: {{ $value | humanize }}"
          description: "Diferencia entre accepted y handled. Posible backlog de workers."

      - alert: NginxTrafficDrop
        expr: rate(nginx_http_requests_total[5m]) < (rate(nginx_http_requests_total[5m] offset 1h) * 0.5) < inf
        for: 10m
        labels:
          severity: warning
          service:  nginx
        annotations:
          summary:     "⚠️ Tráfico Nginx cayó >50% vs hace 1h"
          description: "Caída repentina de tráfico. Posible problema upstream o red."

      - alert: NginxConnectionUsageHigh
        expr: nginx_connections_active / 1024 * 100 > 80
        for: 10m
        labels:
          severity: warning
          service:  nginx
        annotations:
          summary:     "⚠️ Uso de conexiones Nginx >80%"
          description: "worker_connections (1024) casi agotado. Escalar workers."

      - alert: NginxZeroTraffic
        expr: rate(nginx_http_requests_total[5m]) == 0
        for: 5m
        labels:
          severity: critical
          service:  nginx
        annotations:
          summary:     "🔴 Sin tráfico en Nginx en 5min"
          description: "Nginx activo pero sin requests. Posible problema upstream o DNS."

  # ── SLO / Error Budget ────────────────────────────────────────
  - name: hotelflux_slo
    interval: 60s
    rules:

      - alert: HighHTTPErrorRate
        expr: hotelflux:http_error_ratio5m > 0.05
        for: 5m
        labels:
          severity: critical
          service:  backend
          team:     ops
        annotations:
          summary:     "🔴 Error rate 5xx >5% (SLO violado)"
          description: "Error budget consumiéndose. Revisar logs del backend."

      - alert: WarningHTTPErrorRate
        expr: hotelflux:http_error_ratio5m > 0.01
        for: 10m
        labels:
          severity: warning
          service:  backend
        annotations:
          summary:     "⚠️ Error rate 5xx >1%"
          description: "Umbral SLO warning. Monitorear evolución."

      - alert: HighP99Latency
        expr: hotelflux:http_latency_p99_ms > 2000
        for: 5m
        labels:
          severity: warning
          service:  backend
        annotations:
          summary:     "⚠️ Latencia p99 >2s"
          description: "El 1% de requests más lentos supera 2s. Revisar queries."

      - alert: SLOBudgetBurningFast
        expr: (1 - hotelflux:slo_availability_30d) * 100 > 5
        for: 1h
        labels:
          severity: critical
          service:  backend
        annotations:
          summary:     "🔴 Error budget quemado >5% en 30d"
          description: "Disponibilidad 30d: {{ $value | humanizePercentage }}. Incidente necesario."

      - alert: HighP99LatencyByRoute
        expr: histogram_quantile(0.99, sum by (le, route) (rate(phoenix_router_dispatch_stop_duration_native_bucket[5m]))) / 1000000 > 5000
        for: 5m
        labels:
          severity: warning
          service:  backend
        annotations:
          summary:     "⚠️ Ruta lenta: {{ $labels.route }} p99 >5s"
          description: "Endpoint específico con latencia crítica. Optimizar."

  # ── Seguridad OWASP / ISO 27001 ──────────────────────────────
  - name: hotelflux_security
    interval: 30s
    rules:

      - alert: BruteForceDetected
        expr: rate(hotelflux_login_failures_total[5m]) > 10
        for: 2m
        labels:
          severity: critical
          service:  backend
          team:     security
        annotations:
          summary:     "🔴 POSIBLE FUERZA BRUTA: >10 login failures/5min"
          description: "Alta tasa de fallos de autenticación. Posible ataque activo."

      - alert: AccountLockoutWave
        expr: increase(hotelflux_account_lockouts_total[30m]) > 5
        for: 1m
        labels:
          severity: critical
          service:  backend
          team:     security
        annotations:
          summary:     "🔴 Ola de bloqueos de cuenta: {{ $value }} en 30min"
          description: "Múltiples cuentas bloqueadas. Posible ataque dirigido."

      - alert: RateLimitExceededSpike
        expr: rate(hotelflux_rate_limit_hits_total[5m]) > 50
        for: 2m
        labels:
          severity: warning
          service:  backend
          team:     security
        annotations:
          summary:     "⚠️ Rate limit excedido: {{ $value | humanize }}/s"
          description: "Posible escaneo o abuso de endpoints."

      - alert: UnauthorizedAccessSpike
        expr: rate(hotelflux_http_requests_total{status="401"}[5m]) > 20
        for: 5m
        labels:
          severity: warning
          service:  backend
          team:     security
        annotations:
          summary:     "⚠️ 401s elevados: {{ $value | humanize }}/s"
          description: "Muchos accesos no autorizados. Posible scraping de tokens."

      - alert: ForbiddenAccessSpike
        expr: rate(hotelflux_http_requests_total{status="403"}[5m]) > 10
        for: 5m
        labels:
          severity: warning
          service:  backend
          team:     security
        annotations:
          summary:     "⚠️ 403s elevados: {{ $value | humanize }}/s"
          description: "Posible intento de escalada de privilegios."

      - alert: AuditWarningRate
        expr: rate(hotelflux_audit_warnings_total[1h]) > 0
        for: 5m
        labels:
          severity: warning
          service:  backend
          team:     security
        annotations:
          summary:     "⚠️ Eventos de auditoría OWASP en la última hora"
          description: "Revisar logs de auditoría para identificar actividad sospechosa."

  # ── Predicciones y Anomalías ──────────────────────────────────
  - name: hotelflux_predictive
    interval: 5m
    rules:

      - alert: MemoryUsagePredictedOOM
        expr: predict_linear(hotelflux_erlang_memory_bytes{type="total"}[6h], 86400) > 1.8 * 1024 * 1024 * 1024
        for: 30m
        labels:
          severity: critical
          service:  backend
        annotations:
          summary:     "🔴 OOM PREDICHO en 24h"
          description: "Tendencia actual lleva a OOM. Escalar o investigar fuga."

      - alert: DiskUsagePredictedFull
        expr: predict_linear(node_filesystem_avail_bytes[6h], 86400*14) < 0
        for: 1h
        labels:
          severity: critical
          service:  platform
        annotations:
          summary:     "🔴 Disco lleno predecido en 14d"
          description: "Expandir almacenamiento o limpiar logs antiguos."

      - alert: IdleInTransactionLong
        expr: pg_stat_activity_count{state="idle in transaction"} > 5
        for: 10m
        labels:
          severity: warning
          service:  postgres
        annotations:
          summary:     "⚠️ {{ $value }} transacciones idle en PostgreSQL"
          description: "Transacciones abiertas sin commit/rollback. Posible bloqueo."

  # ── Servicios Críticos ────────────────────────────────────────
  - name: hotelflux_critical
    interval: 30s
    rules:

      - alert: AllCriticalServicesDown
        expr: hotelflux:sli_all_services_up == 0
        for: 30s
        labels:
          severity: critical
          service:  platform
          team:     ops
        annotations:
          summary:     "🔴🔴 PLATAFORMA COMPLETA CAÍDA"
          description: "Backend + Postgres + Redis todos caídos. INCIDENTE CRÍTICO."
          runbook_url: "https://wiki.hotelflux.dev/runbooks/platform-down"

      - alert: SingleServiceDown
        expr: count(up{job=~"hotelflux_backend|postgres|redis|nginx"} == 0) >= 1
        for: 2m
        labels:
          severity: critical
          service:  platform
        annotations:
          summary:     "🔴 Servicio crítico CAÍDO: {{ $labels.job }}"
          description: "Un servicio esencial del stack no responde."
