# ═══════════════════════════════════════════════════════════
# HotelFlux — Prometheus Configuration v4
# Scrape: Backend Phoenix, PostgreSQL, Redis, Nginx, Grafana, Prometheus
# Rules:  Recording KPIs + Alert groups (infra + hotel + SLO)
# ═══════════════════════════════════════════════════════════

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    cluster: 'hotelflux'
    env:     'production'

# ── Reglas de alerta y grabación ──────────────────────────
rule_files:
  - "alert_rules.yml"
  - "recording_rules.yml"

# ── Configuraciones de scrape ─────────────────────────────
scrape_configs:

  # ── Backend Phoenix — /metrics ──
  - job_name: 'hotelflux_backend'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 8s
    honor_labels: false
    static_configs:
      - targets: ['backend:4000']
        labels:
          service: 'backend'
          environment: 'production'
          component: 'phoenix'
    metric_relabel_configs:
      # Descarta métricas de debug innecesarias
      - source_labels: [__name__]
        regex: 'erlang_vm_statistics.*'
        action: drop
      # Normaliza etiquetas vacías
      - source_labels: [method]
        regex: ''
        replacement: 'unknown'
        target_label: method

  # ── PostgreSQL Exporter ──
  - job_name: 'postgres'
    scrape_interval: 30s
    scrape_timeout: 15s
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service:     'postgres'
          environment: 'production'
          component:   'database'
    metric_relabel_configs:
      # Solo mantener métricas de la BD hotelflux
      - source_labels: [datname]
        regex: '^$|template.*|postgres'
        action: drop

  # ── Redis Exporter ──
  - job_name: 'redis'
    scrape_interval: 30s
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service:     'redis'
          environment: 'production'
          component:   'cache'

  # ── Prometheus self-monitoring ──
  - job_name: 'prometheus'
    scrape_interval: 60s
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          component: 'monitoring'

  # ── Grafana ──
  - job_name: 'grafana'
    scrape_interval: 60s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service:   'grafana'
          component: 'monitoring'

  # ── Nginx Prometheus Exporter ──
  - job_name: 'nginx'
    scrape_interval: 15s
    scrape_timeout: 5s
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          service:     'nginx'
          environment: 'production'
          component:   'proxy'
    metric_relabel_configs:
      # Normalizar etiquetas de servidor
      - source_labels: [server_zone]
        regex: ''
        replacement: 'main'
        target_label: server_zone
