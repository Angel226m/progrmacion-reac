route:
  receiver: default
  group_by: [severity, service, team]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 30m
      continue: true

    - match:
        team: security
      receiver: security
      repeat_interval: 15m
      group_wait: 10s

    - match:
        service: hotel
      receiver: info
      repeat_interval: 8h

receivers:
  - name: default
    email_configs:
      - to: 'angelgarayt22@gmail.com'
        from: 'alertmanager@hotelflux.dev'
        smarthost: 'smtp.mailgun.org:587'
        auth_username: ''
        auth_password: ''
        require_tls: true
        send_resolved: true
        headers:
          subject: '[HotelFlux] {{ .GroupLabels.severity | toUpper }} - {{ .GroupLabels.alertname }}'

  - name: critical
    email_configs:
      - to: 'angelgarayt22@gmail.com'
        send_resolved: true
        headers:
          subject: '[CRITICAL] HotelFlux - {{ .GroupLabels.alertname }}'

  - name: security
    email_configs:
      - to: 'angelgarayt22@gmail.com'
        send_resolved: true
        headers:
          subject: '[SECURITY] HotelFlux - {{ .GroupLabels.alertname }}'

  - name: info
    email_configs:
      - to: 'angelgarayt22@gmail.com'
        send_resolved: false
        headers:
          subject: '[INFO] HotelFlux - {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [service, alertname]

  - source_match:
      severity: critical
      alertname: AllCriticalServicesDown
    target_match:
      severity: '.*'
    equal: [service]

  - source_match:
      alertname: BackendDown
    target_match_re:
      alertname: '.*(HighMemory|ProcessSpike|RunQueue).*'
    equal: [service]
