route:
  receiver: default
  group_by: [severity, service, team]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 30m
      continue: true

    - match:
        severity: critical
        service: platform
      receiver: pagerduty
      repeat_interval: 15m

    - match:
        team: security
      receiver: security
      repeat_interval: 15m
      group_wait: 10s

    - match:
        service: hotel
      receiver: info
      repeat_interval: 8h

receivers:
  - name: default
    email_configs:
      - to: ${ALERT_EMAIL_TO:-ops@hotelflux.dev}
        from: ${ALERT_EMAIL_FROM:-alertmanager@hotelflux.dev}
        smarthost: ${SMTP_HOST:-smtp.mailgun.org}:${SMTP_PORT:-587}
        auth_username: ${SMTP_USER:-}
        auth_password: ${SMTP_PASSWORD:-}
        require_tls: true
        send_resolved: true
        headers:
          subject: '[HotelFlux] {{ .GroupLabels.severity | toUpper }} - {{ .GroupLabels.alertname }}'

  - name: critical
    email_configs:
      - to: ${ALERT_EMAIL_CRITICAL:-ops+critical@hotelflux.dev}
        send_resolved: true
        headers:
          subject: '[CRITICAL] HotelFlux - {{ .GroupLabels.alertname }}'
    webhook_configs:
      - url: ${SLACK_WEBHOOK_URL:-}
        send_resolved: true
        http_config:
          timeout: 10s

  - name: pagerduty
    pagerduty_configs:
      - routing_key: ${PAGERDUTY_ROUTING_KEY:-}
        severity: critical
        client: HotelFlux
        client_url: https://monitor.angelproyect.com
        description: '{{ .GroupLabels.alertname }} - {{ .GroupLabels.service }}'
        send_resolved: true

  - name: security
    email_configs:
      - to: ${ALERT_EMAIL_SECURITY:-security@hotelflux.dev}
        send_resolved: true
        headers:
          subject: '[SECURITY] HotelFlux - {{ .GroupLabels.alertname }}'
    webhook_configs:
      - url: ${SECURITY_WEBHOOK_URL:-}
        send_resolved: true
        http_config:
          timeout: 10s

  - name: info
    email_configs:
      - to: ${ALERT_EMAIL_INFO:-hotel@hotelflux.dev}
        send_resolved: false
        headers:
          subject: '[INFO] HotelFlux - {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: [service, alertname]

  - source_match:
      severity: critical
      alertname: AllCriticalServicesDown
    target_match:
      severity: '.*'
    equal: [service]

  - source_match:
      alertname: BackendDown
    target_match_re:
      alertname: '.*(HighMemory|ProcessSpike|RunQueue).*'
    equal: [service]
