route:
  group_by: ['severity', 'service', 'team']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 10m
      routes:
        - match:
            service: backend
          receiver: 'critical-backend'
        - match:
            service: postgres
          receiver: 'critical-db'
    - match:
        severity: warning
      receiver: 'warnings'
      repeat_interval: 1h
    - match:
        service: security
      receiver: 'security'
      repeat_interval: 5m

receivers:
  - name: 'default'
    webhook_configs:
      - url: http://alertmanager-webhook:9300/alerts
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: http://alertmanager-webhook:9300/alerts
        send_resolved: true

  - name: 'critical-backend'
    webhook_configs:
      - url: http://alertmanager-webhook:9300/alerts
        send_resolved: true

  - name: 'critical-db'
    webhook_configs:
      - url: http://alertmanager-webhook:9300/alerts
        send_resolved: true

  - name: 'warnings'
    webhook_configs:
      - url: http://alertmanager-webhook:9300/alerts
        send_resolved: true

  - name: 'security'
    webhook_configs:
      - url: http://alertmanager-webhook:9300/alerts
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['service', 'alertname']
  - source_match:
      service: backend
      severity: critical
    target_match:
      service: backend
    equal: ['alertname']
