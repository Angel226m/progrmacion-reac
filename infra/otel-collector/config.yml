receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 16
        max_concurrent_streams: 100
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - http://*
            - https://*
          max_age: 7200

  prometheus:
    config:
      scrape_configs:
        - job_name: otel-collector
          scrape_interval: 30s
          static_configs:
            - targets: [0.0.0.0:8888]

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

  memory_limiter:
    check_interval: 1s
    limit_mib: 256
    spike_limit_mib: 64

  attributes:
    actions:
      - key: environment
        value: production
        action: upsert
      - key: cluster
        value: hotelflux
        action: upsert

  resourcedetection:
    detectors: [docker, env]
    timeout: 5s

  filter:
    error_mode: ignore
    traces:
      span:
        - 'attributes["http.method"] == "OPTIONS"'
        - 'attributes["http.route"] == "/health" or attributes["http.route"] == "/metrics"'

exporters:
  otlp:
    endpoint: tempo:4317
    tls:
      insecure: true
    sending_queue:
      queue_size: 5000
      num_consumers: 10
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 300s

  debug:
    verbosity: basic
    sampling_initial: 2
    sampling_thereafter: 100

  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: hotelflux
    const_labels:
      cluster: hotelflux
      env: production
    resource_to_telemetry_conversion:
      enabled: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes, resourcedetection, filter, batch]
      exporters: [otlp, debug]

    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, attributes, resourcedetection, batch]
      exporters: [prometheus, debug]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, attributes, resourcedetection, filter, batch]
      exporters: [otlp, debug]
