# ═══════════════════════════════════════════════════════════
# HotelFlux — Loki Configuration v2
# Single-process mode | Retención: 30 días | Schema v13
# Optimizado para logs estructurados de Elixir/Phoenix
# ═══════════════════════════════════════════════════════════

auth_enabled: false

server:
  http_listen_address: 0.0.0.0
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn
  http_server_read_timeout:  30s
  http_server_write_timeout: 30s

common:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
  replication_factor: 1
  path_prefix: /loki

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache
    cache_ttl: 24h
  filesystem:
    directory: /loki/chunks

limits_config:
  retention_period:          720h     # 30 días
  max_query_length:          720h
  max_query_series:          10000
  ingestion_rate_mb:         16
  ingestion_burst_size_mb:   32
  per_stream_rate_limit:     3MB
  per_stream_rate_limit_burst: 10MB
  split_queries_by_interval: 15m
  max_entries_limit_per_query: 50000
  # Cardinalidad de streams: límite de etiquetas por stream
  max_label_names_per_series: 15
  max_label_value_length:    4096

compactor:
  working_directory:         /loki/compactor
  compaction_interval:       10m
  retention_enabled:         true
  delete_request_cancel_period: 10m
  delete_request_store:      filesystem

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled:    true
        max_size_mb: 150
        ttl:         1h

# Optimización de queries
querier:
  max_concurrent: 8

query_scheduler:
  max_outstanding_requests_per_tenant: 2048

frontend:
  compress_responses: true
  max_outstanding_per_tenant: 2048

analytics:
  reporting_enabled: false
