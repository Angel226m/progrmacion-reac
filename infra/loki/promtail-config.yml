# ═══════════════════════════════════════════════════════════
# HotelFlux — Promtail Configuration
# Recolector de logs → envía a Loki
# ═══════════════════════════════════════════════════════════

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Logs de contenedores Docker ──
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: hotelflux
          __path__: /var/log/containers/*.log

    pipeline_stages:
      - docker: {}

      # Etiqueta por nombre de contenedor
      - regex:
          source: filename
          expression: '/var/log/containers/(?P<container>[^/]+)\.log'

      - labels:
          container:

      # Extraer nivel de log de Elixir
      - regex:
          source: output
          expression: '\[(?P<level>debug|info|warning|error)\]'

      - labels:
          level:
