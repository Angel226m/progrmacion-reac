name: hotelflux-core

x-restart: &restart_policy
  restart: always

x-logging: &logging_defaults
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    tag: "{{.Name}}"
    labels: "com.docker.compose.service"

x-security: &security_hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - NET_BIND_SERVICE
    - CHOWN
    - SETGID
    - SETUID
  read_only: false  # read_only habilitado individualmente

x-healthcheck-postgres: &hc_postgres
  test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotelflux} -d ${POSTGRES_DB:-hotelflux_prod}"]
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 15s

x-healthcheck-redis: &hc_redis
  test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 5s

x-healthcheck-http: &hc_http
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 30s

x-deploy-app: &deploy_app
  resources:
    reservations:
      memory: 128M
      cpus: "0.25"
    limits:
      memory: 1G
      cpus: "1.0"

x-deploy-data: &deploy_data
  resources:
    reservations:
      memory: 64M
      cpus: "0.1"
    limits:
      memory: 1G
      cpus: "1.0"

x-deploy-monitoring: &deploy_monitoring
  resources:
    reservations:
      memory: 64M
      cpus: "0.1"
    limits:
      memory: 512M
      cpus: "0.5"

services:
  postgres:
    <<: *restart_policy
    image: postgres:18-alpine
    user: root
    container_name: hotelflux_core_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hotelflux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD no definido en .env}
      POSTGRES_DB: ${POSTGRES_DB:-hotelflux_prod}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      TZ: America/Lima
    volumes:
      - pgdata_core:/var/lib/postgresql/data
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
      - /var/run/postgresql:noexec,nosuid,size=8M
    healthcheck: *hc_postgres
    deploy: *deploy_data
    logging: *logging_defaults
    networks:
      - backend
    labels:
      service.type: "data"
      service.name: "postgres"
      monitoring.alert: "critical"

  redis:
    <<: [*restart_policy, *security_hardening]
    image: redis:8-alpine
    container_name: hotelflux_core_redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD no definido en .env}
      TZ: America/Lima
    command:
      - redis-server
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
      - --appendonly yes
      - --appendfsync everysec
      - --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD no definido en .env}
    volumes:
      - redisdata_core:/data
    tmpfs:
      - /tmp:noexec,nosuid,size=32M
    healthcheck: *hc_redis
    deploy: *deploy_data
    logging: *logging_defaults
    networks:
      - backend
    labels:
      service.type: "data"
      service.name: "redis"
      monitoring.alert: "critical"

  backend-init:
    <<: *restart_policy
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: hotelflux_core_backend_init
    command:
      - sh
      - -c
      - |
        echo ">>> Ejecutando migraciones..."
        ./bin/hotelflux eval 'HotelFlux.Release.migrate()'
        echo ">>> Sembrando datos iniciales..."
        ./bin/hotelflux eval 'HotelFlux.Release.seed()'
        echo ">>> Init completado."
    environment:
      DATABASE_URL:    ecto://${POSTGRES_USER:-hotelflux}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hotelflux_prod}
      REDIS_URL:       redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE no definido en .env (min 64 chars)}
      GUARDIAN_SECRET: ${GUARDIAN_SECRET:?GUARDIAN_SECRET no definido en .env}
      PHX_HOST:        ${PHX_HOST:-program-react.angelproyect.com}
      MIX_ENV:         prod
      POOL_SIZE:       "1"
      CHECK_ORIGINS:   ${CHECK_ORIGINS:-https://program-react.angelproyect.com,https://reactiva-personal.angelproyect.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          memory: 128M
          cpus: "0.25"
        limits:
          memory: 512M
          cpus: "1.0"
    restart: "no"
    logging: *logging_defaults
    networks:
      - backend

  hotelflux-backend:
    <<: *restart_policy
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: hotelflux_core_backend
    environment:
      DATABASE_URL:    ecto://${POSTGRES_USER:-hotelflux}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hotelflux_prod}
      REDIS_URL:       redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE no definido en .env (min 64 chars)}
      GUARDIAN_SECRET: ${GUARDIAN_SECRET:?GUARDIAN_SECRET no definido en .env}
      PHX_HOST:        ${PHX_HOST:-program-react.angelproyect.com}
      PORT:            "4000"
      MIX_ENV:         prod
      POOL_SIZE:       "${POOL_SIZE:-15}"
      ERL_MAX_PORTS:   "${ERL_MAX_PORTS:-4096}"
      CHECK_ORIGINS:   ${CHECK_ORIGINS:-https://program-react.angelproyect.com,https://reactiva-personal.angelproyect.com}
      TZ:              America/Lima
      METRICS_TOKEN:   ${METRICS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://127.0.0.1:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        reservations:
          memory: 256M
          cpus: "0.5"
        limits:
          memory: 1G
          cpus: "1.5"
    logging: *logging_defaults
    networks:
      backend:
        aliases:
          - hotelflux-backend
      monitoring:
    labels:
      service.type: "app"
      service.name: "backend"
      monitoring.alert: "critical"

  frontend-personal:
    <<: *restart_policy
    build:
      context: ./frontend-personal
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_URL: /api/v1
        VITE_WS_URL: /socket
    container_name: hotelflux_core_frontend_personal
    depends_on:
      hotelflux-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        reservations:
          memory: 32M
          cpus: "0.1"
        limits:
          memory: 128M
          cpus: "0.25"
    logging: *logging_defaults
    networks:
      - frontend
      - monitoring
    labels:
      service.type: "frontend"
      service.name: "frontend-personal"

  frontend-cliente:
    <<: *restart_policy
    build:
      context: ./frontend-cliente
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_URL: /api/v1
        VITE_WS_URL: /socket
    container_name: hotelflux_core_frontend_cliente
    depends_on:
      hotelflux-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        reservations:
          memory: 32M
          cpus: "0.1"
        limits:
          memory: 128M
          cpus: "0.25"
    logging: *logging_defaults
    networks:
      - frontend
      - monitoring
    labels:
      service.type: "frontend"
      service.name: "frontend-cliente"

  # ── MONITORING STACK ──────────────────────────────────────────

  prometheus:
    <<: *restart_policy
    image: prom/prometheus:v2.55.1
    container_name: hotelflux_core_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=10GB
      - --storage.tsdb.wal-compression=true
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
      - --web.enable-admin-api
      - --enable-feature=native-histograms
    volumes:
      - ./infra/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    tmpfs:
      - /tmp:noexec,nosuid,size=128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy: *deploy_monitoring
    logging: *logging_defaults
    networks:
      - monitoring
    labels:
      service.type: "monitoring"
      service.name: "prometheus"

  grafana:
    <<: *restart_policy
    image: grafana/grafana:11.5.2
    container_name: hotelflux_core_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin123}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_SERVER_ROOT_URL: https://monitor.angelproyect.com
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "strict"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
      TZ: America/Lima
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          memory: 128M
          cpus: "0.25"
        limits:
          memory: 512M
          cpus: "0.75"
    logging: *logging_defaults
    networks:
      - monitoring
    labels:
      service.type: "monitoring"
      service.name: "grafana"

  loki:
    <<: *restart_policy
    image: grafana/loki:3.4.2
    container_name: hotelflux_core_loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki:/etc/loki
      - loki_data:/loki
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy: *deploy_monitoring
    logging: *logging_defaults
    networks:
      - monitoring
    labels:
      service.type: "monitoring"
      service.name: "loki"

  promtail:
    <<: *restart_policy
    image: grafana/promtail:3.4.2
    container_name: hotelflux_core_promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/loki/promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=32M
    deploy:
      resources:
        reservations:
          memory: 32M
          cpus: "0.1"
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *logging_defaults
    networks:
      - monitoring
    depends_on:
      - loki
    labels:
      service.type: "monitoring"
      service.name: "promtail"

  alertmanager:
    <<: *restart_policy
    image: prom/alertmanager:v0.28.1
    container_name: hotelflux_core_alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --cluster.listen-address=
      - --log.level=warn
    volumes:
      - ./infra/alertmanager:/etc/alertmanager
      - alertmanager_data:/alertmanager
    tmpfs:
      - /tmp:noexec,nosuid,size=32M
    deploy: *deploy_monitoring
    logging: *logging_defaults
    networks:
      - monitoring
    labels:
      service.type: "monitoring"
      service.name: "alertmanager"

  node-exporter:
    <<: *restart_policy
    image: prom/node-exporter:v1.8.2
    container_name: hotelflux_core_node_exporter
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      - --no-collector.arp
      - --no-collector.bcache
      - --no-collector.conntrack
      - --no-collector.edac
      - --no-collector.entropy
      - --no-collector.fibrechannel
      - --no-collector.hwmon
      - --no-collector.infiniband
      - --no-collector.ipvs
      - --no-collector.mdadm
      - --no-collector.netstat
      - --no-collector.nfs
      - --no-collector.nfsd
      - --no-collector.pressure
      - --no-collector.schedstat
      - --no-collector.sockstat
      - --no-collector.softnet
      - --no-collector.tapestats
      - --no-collector.textfile
      - --no-collector.time
      - --no-collector.udp
      - --no-collector.uname
      - --no-collector.vmstat
      - --no-collector.wifi
      - --no-collector.xfs
      - --no-collector.zfs
    volumes:
      - /:/host:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=16M
    deploy:
      resources:
        reservations:
          memory: 16M
          cpus: "0.05"
        limits:
          memory: 128M
          cpus: "0.25"
    logging: *logging_defaults
    networks:
      - monitoring
    pid: "host"
    labels:
      service.type: "monitoring"
      service.name: "node-exporter"

  cadvisor:
    <<: *restart_policy
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: hotelflux_core_cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=16M
    devices:
      - /dev/kmsg
    privileged: false
    deploy:
      resources:
        reservations:
          memory: 32M
          cpus: "0.1"
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *logging_defaults
    networks:
      - monitoring
    labels:
      service.type: "monitoring"
      service.name: "cadvisor"

  tempo:
    <<: *restart_policy
    image: grafana/tempo:2.7.1
    container_name: hotelflux_core_tempo
    command:
      - -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./infra/tempo:/etc/tempo
      - tempo_data:/tmp/tempo
    tmpfs:
      - /tmp:noexec,nosuid,size=128M
    deploy: *deploy_monitoring
    logging: *logging_defaults
    networks:
      - monitoring
    labels:
      service.type: "monitoring"
      service.name: "tempo"

  otel-collector:
    <<: *restart_policy
    image: otel/opentelemetry-collector-contrib:0.119.0
    container_name: hotelflux_core_otel_collector
    command:
      - --config=/etc/otel/config.yml
    volumes:
      - ./infra/otel-collector:/etc/otel
    tmpfs:
      - /tmp:noexec,nosuid,size=32M
    deploy: *deploy_monitoring
    logging: *logging_defaults
    networks:
      - monitoring
    labels:
      service.type: "monitoring"
      service.name: "otel-collector"

  postgres-exporter:
    <<: *restart_policy
    image: prometheuscommunity/postgres-exporter:v0.17.1
    container_name: hotelflux_core_postgres_exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-hotelflux}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hotelflux_prod}?sslmode=disable
      TZ: America/Lima
    tmpfs:
      - /tmp:noexec,nosuid,size=16M
    deploy:
      resources:
        reservations:
          memory: 16M
          cpus: "0.05"
        limits:
          memory: 128M
          cpus: "0.25"
    logging: *logging_defaults
    networks:
      - backend
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      service.type: "monitoring"
      service.name: "postgres-exporter"

  redis-exporter:
    <<: *restart_policy
    image: oliver006/redis_exporter:v1.68.0
    container_name: hotelflux_core_redis_exporter
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD no definido en .env}
      TZ: America/Lima
    tmpfs:
      - /tmp:noexec,nosuid,size=16M
    deploy:
      resources:
        reservations:
          memory: 16M
          cpus: "0.05"
        limits:
          memory: 128M
          cpus: "0.25"
    logging: *logging_defaults
    networks:
      - backend
      - monitoring
    depends_on:
      redis:
        condition: service_healthy
    labels:
      service.type: "monitoring"
      service.name: "redis-exporter"

  nginx-exporter:
    <<: *restart_policy
    image: nginx/nginx-prometheus-exporter:1.4.1
    container_name: hotelflux_core_nginx_exporter
    environment:
      SCRAPE_URI: http://nginx:80/metrics
      TZ: America/Lima
    deploy:
      resources:
        reservations:
          memory: 16M
          cpus: "0.05"
        limits:
          memory: 64M
          cpus: "0.1"
    logging: *logging_defaults
    networks:
      - proxy
    labels:
      service.type: "monitoring"
      service.name: "nginx-exporter"

  # ── DB Backup automático a Backblaze B2 ────────────────────
  # Horario: 19:00 hora Peru (00:00 UTC) todos los dias
  # Retención local: 7 días
  db-backup:
    <<: *restart_policy
    build:
      context: ./infra/backup
      dockerfile: Dockerfile
    container_name: hotelflux_core_db_backup
    environment:
      POSTGRES_HOST:        postgres
      POSTGRES_USER:        ${POSTGRES_USER:-hotelflux}
      POSTGRES_PASSWORD:    ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD no definido en .env}
      POSTGRES_DB:          ${POSTGRES_DB:-hotelflux_prod}
      B2_KEY_ID:            ${B2_KEY_ID:?B2_KEY_ID no definido en .env}
      B2_APP_KEY:           ${B2_APP_KEY:?B2_APP_KEY no definido en .env}
      B2_BUCKET:            ${B2_BUCKET:?B2_BUCKET no definido en .env}
      TZ:                   America/Lima
      BACKUP_RETENTION_DAYS: "${BACKUP_RETENTION_DAYS:-7}"
      BACKUP_CRON_SCHEDULE:  "${BACKUP_CRON_SCHEDULE:-0 0 * * *}"
      BACKUP_COMPRESSION:    "${BACKUP_COMPRESSION:-gzip}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backup_data:/backups
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    deploy:
      resources:
        reservations:
          memory: 64M
          cpus: "0.1"
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *logging_defaults
    networks:
      - backend
    labels:
      service.type: "job"
      service.name: "db-backup"

volumes:
  pgdata_core:
    driver: local
  redisdata_core:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  alertmanager_data:
    driver: local
  tempo_data:
    driver: local
  backup_data:
    driver: local

networks:
  backend:
    driver: bridge
    internal: true
    name: hotelflux_core_backend
  frontend:
    driver: bridge
    name: hotelflux_core_frontend
  monitoring:
    driver: bridge
    internal: true
    name: hotelflux_core_monitoring
  proxy:
    driver: bridge
    name: hotelflux_core_proxy
