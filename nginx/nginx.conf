    # ── DEFAULT HTTP catch-all — devuelve 444 inmediatamente ──────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        access_log /var/log/nginx/access.log security;
        return 444;
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # DEFAULT HTTPS catch-all — IP directa, Host inválido
    # ═══════════════════════════════════════════════════════════════════════════

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/nginx/certs/domain.cert.pem;
        ssl_certificate_key /etc/nginx/certs/private.key.pem;

        access_log /var/log/nginx/access.log security;

        # Cierra la conexión sin respuesta — no revela nada
        return 444;
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # HTTPS — ADMIN.ANGELPROYECT.COM
    # ═══════════════════════════════════════════════════════════════════════════

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2  on;
        server_name admin.angelproyect.com www.admin.angelproyect.com;

        ssl_certificate     /etc/nginx/certs/domain.cert.pem;
        ssl_certificate_key /etc/nginx/certs/private.key.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        limit_conn addr 50;

        # ── Bloqueos de seguridad ── DEBEN estar DENTRO del server block ───────
        if ($bad_ua)     { return 444; }
        if ($bad_method) { return 444; }

        # PHP — siempre 444, sin excepción
        location ~* \.php$ {
            access_log /var/log/nginx/access.log security;
            return 444;
        }

        # Rutas sensibles de frameworks / exploración
        location ~* (cgi-bin|wp-admin|wp-includes|wp-content|wp-json|xmlrpc|class-wp|composer\.json|package\.json|yarn\.lock|grpc\.reflection) {
            access_log /var/log/nginx/access.log security;
            return 444;
        }

        # Archivos de secretos y control de versiones
        location ~* (\.(env|env\.|git|svn|htaccess|htpasswd|DS_Store|bash_history|ssh|aws)|git-credentials|gitconfig|dockerenv) {
            access_log /var/log/nginx/access.log security;
            return 444;
        }

        # Path traversal
        location ~* \.\./  {
            access_log /var/log/nginx/access.log security;
            return 444;
        }

        location /health {
            access_log off;
            return 200 "admin-https-healthy\n";
            add_header Content-Type text/plain;
        }

        # ── Login — rate limit estricto ────────────────────────────────────────
        location ~ ^/api/v1/(auth/login|clientes/login) {
            limit_req        zone=login burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend_servers;
            proxy_http_version 1.1;

            proxy_set_header Connection          "";
            proxy_set_header Host                $host;
            proxy_set_header X-Real-IP           $remote_addr;
            proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto   $scheme;
            proxy_set_header X-Forwarded-Host    $host;
            proxy_set_header X-Forwarded-Port    $server_port;
            proxy_set_header X-Forwarded-Ssl     $proxy_x_forwarded_ssl;
            proxy_set_header X-Request-ID        $request_uid;

            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;

            add_header Access-Control-Allow-Origin      "https://admin.angelproyect.com" always;
            add_header Access-Control-Allow-Methods     "POST, OPTIONS"                  always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true"                           always;
            add_header Access-Control-Max-Age           "3600"                           always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin      "https://admin.angelproyect.com" always;
                add_header Access-Control-Allow-Methods     "POST, OPTIONS"                  always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials "true"                           always;
                add_header Access-Control-Max-Age           "3600"                           always;
                add_header Content-Type   "text/plain" always;
                add_header Content-Length 0            always;
                return 204;
            }

            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
            proxy_buffering        on;
            proxy_buffer_size      8k;
            proxy_buffers          8 32k;
            proxy_busy_buffers_size 64k;
        }

        # ── API general ────────────────────────────────────────────────────────
        location /api/v1/ {
            limit_req        zone=api burst=30 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend_servers;
            proxy_http_version 1.1;

            proxy_set_header Connection          "";
            proxy_set_header Host                $host;
            proxy_set_header X-Real-IP           $remote_addr;
            proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto   $scheme;
            proxy_set_header X-Forwarded-Host    $host;
            proxy_set_header X-Forwarded-Port    $server_port;
            proxy_set_header X-Request-ID        $request_uid;

            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;

            add_header Access-Control-Allow-Origin      "https://admin.angelproyect.com"                        always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS"                always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true"                                                   always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin      "https://admin.angelproyect.com"                        always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS"                always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials "true"                                                   always;
                add_header Access-Control-Max-Age           "3600"                                                   always;
                add_header Content-Type   "text/plain" always;
                add_header Content-Length 0            always;
                return 204;
            }

            proxy_connect_timeout   30s;
            proxy_send_timeout      60s;
            proxy_read_timeout      60s;
            proxy_buffering         on;
            proxy_buffer_size       8k;
            proxy_buffers           16 32k;
            proxy_busy_buffers_size 64k;
        }

        # ── Frontend / SPA ─────────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend_servers;
            proxy_http_version 1.1;

            proxy_set_header Connection        "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_uid;
            proxy_redirect off;

            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
                proxy_pass http://frontend_servers;
                expires    1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        error_page 404 = @admin_fallback;
        location @admin_fallback {
            proxy_pass         http://frontend_servers;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_uid;
            proxy_hide_header  X-Powered-By;
            proxy_hide_header  Server;
        }

        error_page 429 /429.html;
        location = /429.html {
            root     /usr/share/nginx/html;
            internal;
            add_header Retry-After 10 always;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root     /usr/share/nginx/html;
            internal;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # HTTPS — RESERVAS.ANGELPROYECT.COM
    # ═══════════════════════════════════════════════════════════════════════════

    server {
        listen 443 ssl;
