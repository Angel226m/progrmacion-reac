# ═══════════════════════════════════════════════════════════════════════════════
# POST-DEPLOY CHECKLIST
# ═══════════════════════════════════════════════════════════════════════════════
#
# 1. nginx -t                              → validar config antes de recargar
# 2. nginx -s reload                       → recarga sin downtime
#
# 3. Generar DH params (solo 1 vez, ~10min en 4096):
#    openssl dhparam -out /etc/nginx/certs/dhparam.pem 4096
#    Descomentar ssl_dhparam en este archivo.
#
# 4. Crear páginas de error personalizadas:
#    /usr/share/nginx/html/429.html  → "Demasiadas solicitudes, intenta en 10s"
#    /usr/share/nginx/html/50x.html  → página de error genérica sin info técnica
#
# 5. Instalar Fail2ban + jail para nginx:
#    apt install fail2ban
#    Crear /etc/fail2ban/jail.d/nginx.conf con filtros para:
#      - nginx-limit-req     (status 429)
#      - nginx-badbots       (UA bloqueados)
#      - nginx-noscript      (intentos .php/.env)
#    Banear por 24h con findtime=10m, maxretry=10
#
# 6. Renombrar subdominio en DNS y Docker:
#    program_react.angelproyect.com → program-react.angelproyect.com
#
# 7. Revisar semanal:
#    tail -f /var/log/nginx/access.log | grep ' 444 '
#    Agregar IPs reincidentes a blocklist de iptables/nftables
#
# ═══════════════════════════════════════════════════════════════════════════════