    # ═══════════════════════════════════════════════════════════════
    # HTTPS - PORTAFOLIO.ANGELPROYECT.COM
    # ═══════════════════════════════════════════════════════════════

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name portafolio.angelproyect.com www.portafolio.angelproyect.com;

        ssl_certificate /etc/nginx/certs/domain.cert.pem;
        ssl_certificate_key /etc/nginx/certs/private.key.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        limit_conn addr 50;

        location /health {
            access_log off;
            return 200 "portafolio-https-healthy\n";
            add_header Content-Type text/plain;
        }

        # Assets estáticos con cache agresivo (portafolio es sitio estático)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            limit_req zone=portfolio burst=50 nodelay;

            proxy_pass http://portfolio_servers;
            proxy_http_version 1.1;

            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # HTML y rutas (incluye SPA client-side routing)
        location / {
            limit_req zone=portfolio burst=30 nodelay;

            proxy_pass http://portfolio_servers;
            proxy_http_version 1.1;

            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;
        }

        # Fallback SPA (necesario si usas React Router, Vue Router, etc.)
        error_page 404 = @portfolio_fallback;
        location @portfolio_fallback {
            proxy_pass http://portfolio_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

