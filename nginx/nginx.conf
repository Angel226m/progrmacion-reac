# ═══════════════════════════════════════════════════════════════════════════════
# NGINX.CONF — PRODUCCIÓN ULTRA-HARDENED
# angelproyect.com — Todos los servicios
#
# Mejoras aplicadas vs versión anterior:
#   [FIX-CRÍTICO] Security location blocks movidos DENTRO de cada server{}
#   [FIX]         include snippets para no repetir código
#   [FIX]         default HTTP devuelve 444 en vez de redirect útil
#   [NEW]         limit_conn en HTTP también
#   [NEW]         proxy_hide_header para no filtrar info del upstream
#   [NEW]         $request_id para trazabilidad end-to-end
#   [NEW]         Timeouts más agresivos en default server
#   [NEW]         Bloqueo de métodos HTTP raros (CONNECT, TRACE, etc.)
#   [NEW]         client_body_buffer_size reducido en crackguard
#   [NEW]         CORS wildcard eliminado del stream (restringido)
#   [NEW]         map para bloquear IPs directas (sin Host header válido)
#   [NEW]         log_format extendido con $request_id
#   [NEW]         Bloqueo de Content-Type malformado en uploads
#   [NEW]         ssl_dhparam preparado (ver nota al final)
# ═══════════════════════════════════════════════════════════════════════════════

events {
    worker_connections  2048;
    use                 epoll;
    multi_accept        on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    charset      utf-8;
    server_tokens off;

    # ── Buffers ────────────────────────────────────────────────────────────────
    client_body_buffer_size      128k;
    client_header_buffer_size    1k;
    large_client_header_buffers  4 16k;
    output_buffers               1 32k;
    postpone_output              1460;

    # ── Request ID (trazabilidad) ──────────────────────────────────────────────
    # Genera un UUID único por request; lo propaga al upstream y lo loguea
    map $http_x_request_id $request_uid {
        default $request_id;
        ~.+     $http_x_request_id;
    }

    # ── WebSocket upgrade map ──────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Proxy SSL header ───────────────────────────────────────────────────────
    map $scheme $proxy_x_forwarded_ssl {
        default off;
        https   on;
    }

    # ── Bad User-Agents ────────────────────────────────────────────────────────
    map $http_user_agent $bad_ua {
        default 0;
        ""      1;
        "~*(Shodan|zgrab|Go-http-client|FreePBX|grpcurl|visionheight)"        1;
        "~*(masscan|nmap|ZMap|Nikto|Arachni|WPScan|WFuzz|dirb|Gobuster)"      1;
        "~*(l9explore|l9tcpid|sqlmap|hydra|dirbuster|nuclei|subfinder)"        1;
        "~*(python-requests/|python-urllib|scrapy|curl/7\.[0-6])"              1;
        "~*(xfa|zgrab|HeadlessChrome/[0-9]{2,3}\.0\.0\.0 Safari)"             1;
    }

    # ── Métodos HTTP permitidos (bloqueo de TRACE, CONNECT, etc.) ─────────────
    map $request_method $bad_method {
        default 0;
        TRACE   1;
        CONNECT 1;
        DEBUG   1;
        TRACK   1;
    }

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'rid=$request_uid';

    log_format security '$remote_addr [$time_local] "$request" '
                        '$status "$http_user_agent" '
                        'ua_blocked=$bad_ua method_blocked=$bad_method '
                        'rid=$request_uid';

    access_log /var/log/nginx/access.log   main     buffer=32k flush=5s;
    error_log  /var/log/nginx/error.log    warn;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 100;

    # ── Limits ─────────────────────────────────────────────────────────────────
    client_max_body_size    25M;
    client_body_timeout     12;
    client_header_timeout   12;
    send_timeout            10;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m        rate=15r/s;
    limit_req_zone  $binary_remote_addr zone=login:10m      rate=2r/s;
    limit_req_zone  $binary_remote_addr zone=crackguard:10m rate=5r/s;
    limit_req_zone  $binary_remote_addr zone=portfolio:10m  rate=20r/s;
    limit_req_zone  $binary_remote_addr zone=global:20m     rate=30r/s;

    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Log rate limit violations (requiere nginx >= 1.17)
    limit_req_log_level  warn;
    limit_conn_log_level warn;

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip             on;
    gzip_vary        on;
    gzip_min_length  1024;
    gzip_comp_level  5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/json
        application/ld+json
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;
    gzip_proxied any;
    gzip_disable "msie6";

    # ── Security Headers globales ──────────────────────────────────────────────
    add_header X-Frame-Options          "DENY"                              always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header X-XSS-Protection         "1; mode=block"                     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    add_header X-Request-ID             $request_uid                        always;

    # ── SSL/TLS global ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:50m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    # NOTA: Generar con: openssl dhparam -out /etc/nginx/certs/dhparam.pem 4096
    ssl_dhparam             /etc/nginx/certs/dhparam.pem;

    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            127.0.0.11 valid=10s ipv6=off;
    resolver_timeout    5s;

    # ── Proxy headers comunes (snippet inline) ─────────────────────────────────
    # Usado como referencia — cada location los declara explícitamente
    # para evitar herencia silenciosa de contextos padres

    # ───────────────────────────────────────────────────────────────────────────
    # UPSTREAMS — SISTEMA TOURS
    # ───────────────────────────────────────────────────────────────────────────

    upstream backend_servers {
        server backend:8080 max_fails=3 fail_timeout=30s;
        keepalive          64;
        keepalive_timeout  60s;
        keepalive_requests 1000;
    }

    upstream frontend_servers {
        server frontend-container:80 max_fails=3 fail_timeout=30s;
        keepalive         64;
        keepalive_timeout 60s;
    }

    upstream paginawebbtour_servers {
        server paginawebbtour-container:80 max_fails=3 fail_timeout=30s;
        keepalive         64;
        keepalive_timeout 60s;
    }

    # ───────────────────────────────────────────────────────────────────────────
    # UPSTREAMS — CRACKGUARD
    # ───────────────────────────────────────────────────────────────────────────

    upstream crackguard_backend {
        server crackguard-backend:5000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream crackguard_frontend {
        server crackguard-frontend:80 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ───────────────────────────────────────────────────────────────────────────
    # UPSTREAMS — PORTAFOLIO
    # ───────────────────────────────────────────────────────────────────────────

    upstream portfolio_servers {
        server 172.17.0.1:8081 max_fails=3 fail_timeout=30s;
        keepalive         32;
        keepalive_timeout 60s;
    }

    # ───────────────────────────────────────────────────────────────────────────
    # UPSTREAMS — HOTELFLUX
    # ───────────────────────────────────────────────────────────────────────────

    upstream hotelflux_frontend_personal {
        server hotelflux_core_frontend_personal:8080 max_fails=3 fail_timeout=30s;
        keepalive         64;
        keepalive_timeout 60s;
    }

    upstream hotelflux_frontend_cliente {
        server hotelflux_core_frontend_cliente:8080 max_fails=3 fail_timeout=30s;
        keepalive         64;
        keepalive_timeout 60s;
    }

    # ───────────────────────────────────────────────────────────────────────────
    # UPSTREAMS — MONITOREO
    # ───────────────────────────────────────────────────────────────────────────

    upstream monitor_servers {
        server hotelflux_core_grafana:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream prometheus_servers {
        server hotelflux_core_prometheus:9090 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # HTTP → HTTPS REDIRECTS
    # ═══════════════════════════════════════════════════════════════════════════

    server {
        listen 80;
        listen [::]:80;
        server_name admin.angelproyect.com www.admin.angelproyect.com;

        limit_conn addr 20;

        location /health {
            access_log off;
            return 200 "nginx-admin-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://admin.angelproyect.com$request_uri;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name reservas.angelproyect.com www.reservas.angelproyect.com;

        limit_conn addr 20;

        location /health {
