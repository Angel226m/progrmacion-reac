        http2  on;
        server_name reservas.angelproyect.com www.reservas.angelproyect.com;

        ssl_certificate     /etc/nginx/certs/domain.cert.pem;
        ssl_certificate_key /etc/nginx/certs/private.key.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        limit_conn addr 50;

        if ($bad_ua)     { return 444; }
        if ($bad_method) { return 444; }

        location ~* \.php$ {
            access_log /var/log/nginx/access.log security;
            return 444;
        }
        location ~* (cgi-bin|wp-admin|wp-includes|wp-content|wp-json|xmlrpc|class-wp|composer\.json|package\.json|yarn\.lock|grpc\.reflection) {
