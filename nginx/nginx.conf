    # ═══════════════════════════════════════════════════════════════════════════
    # HTTPS — REACTIVA-CLIENTE.ANGELPROYECT.COM (HotelFlux Cliente)
    # ═══════════════════════════════════════════════════════════════════════════

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2  on;
        server_name reactiva-cliente.angelproyect.com www.reactiva-cliente.angelproyect.com;
        set $hf_backend "hotelflux_core_backend:4000";

        ssl_certificate     /etc/nginx/certs/domain.cert.pem;
        ssl_certificate_key /etc/nginx/certs/private.key.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        limit_conn addr 50;

        if ($bad_ua)     { return 444; }
        if ($bad_method) { return 444; }

        location ~* \.php$ {
            access_log /var/log/nginx/access.log security;
            return 444;
        }
        location ~* (cgi-bin|wp-admin|wp-includes|wp-content|wp-json|xmlrpc|class-wp|composer\.json|package\.json|yarn\.lock|grpc\.reflection) {
            access_log /var/log/nginx/access.log security;
            return 444;
        }
        location ~* (\.(env|git|svn|htaccess|htpasswd|DS_Store|bash_history)|git-credentials|gitconfig|dockerenv) {
            access_log /var/log/nginx/access.log security;
            return 444;
        }
        location ~* \.\./  {
            access_log /var/log/nginx/access.log security;
            return 444;
        }

        location /health {
            access_log off;
            return 200 "reactiva-cliente-https-healthy\n";
            add_header Content-Type text/plain;
        }

        location ~ ^/api/v1/(auth/login|clientes/login|clientes/registro|clientes/refresh) {
            limit_req        zone=login burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://$hf_backend;
            proxy_http_version 1.1;

            proxy_set_header Connection          "";
            proxy_set_header Host                $host;
            proxy_set_header X-Real-IP           $remote_addr;
            proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto   $scheme;
            proxy_set_header X-Forwarded-Host    $host;
            proxy_set_header X-Forwarded-Port    $server_port;
            proxy_set_header X-Forwarded-Ssl     $proxy_x_forwarded_ssl;
            proxy_set_header X-Request-ID        $request_uid;

            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;

            add_header Access-Control-Allow-Origin      "https://reactiva-cliente.angelproyect.com"                always;
            add_header Access-Control-Allow-Methods     "POST, OPTIONS"                                         always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true"                                                   always;
            add_header Access-Control-Max-Age           "3600"                                                   always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin      "https://reactiva-cliente.angelproyect.com"                always;
                add_header Access-Control-Allow-Methods     "POST, OPTIONS"                                         always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials "true"                                                   always;
                add_header Access-Control-Max-Age           "3600"                                                   always;
                add_header Content-Type   "text/plain" always;
                add_header Content-Length 0            always;
                return 204;
            }

            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;
            proxy_buffering        on;
            proxy_buffer_size      8k;
            proxy_buffers          8 32k;
        }

        location /api/v1/ {
            limit_req        zone=api burst=30 nodelay;
            limit_req_status 429;

            proxy_pass         http://$hf_backend;
            proxy_http_version 1.1;

            proxy_set_header Connection          "";
            proxy_set_header Host                $host;
            proxy_set_header X-Real-IP           $remote_addr;
            proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto   $scheme;
            proxy_set_header X-Forwarded-Host    $host;
            proxy_set_header X-Forwarded-Port    $server_port;
            proxy_set_header X-Request-ID        $request_uid;

            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;

            add_header Access-Control-Allow-Origin      "https://reactiva-cliente.angelproyect.com"                always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS"                always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true"                                                   always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin      "https://reactiva-cliente.angelproyect.com"                always;
                add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS"                always;
                add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials "true"                                                   always;
                add_header Access-Control-Max-Age           "3600"                                                   always;
                add_header Content-Type   "text/plain" always;
                add_header Content-Length 0            always;
                return 204;
            }

            proxy_connect_timeout   30s;
            proxy_send_timeout      60s;
            proxy_read_timeout      60s;
            proxy_buffering         on;
            proxy_buffer_size       8k;
            proxy_buffers           16 32k;
        }

        location /socket {
            proxy_pass         http://$hf_backend;
            proxy_http_version 1.1;

            proxy_set_header Origin            $http_origin;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
            proxy_set_header X-Request-ID      $request_uid;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout    86400s;
            proxy_send_timeout    86400s;
            proxy_connect_timeout 7200s;

            proxy_buffering off;

            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        location / {
            proxy_pass         http://hotelflux_frontend_cliente;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_uid;
            proxy_redirect     off;

            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
                proxy_pass http://hotelflux_frontend_cliente;
                expires    1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        error_page 404 = @hotelflux_cliente_fallback;
        location @hotelflux_cliente_fallback {
            proxy_pass        http://hotelflux_frontend_cliente;
            proxy_set_header  Host              $host;
            proxy_set_header  X-Real-IP         $remote_addr;
            proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
            proxy_set_header  X-Request-ID      $request_uid;
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        error_page 429 /429.html;
        location = /429.html { root /usr/share/nginx/html; internal; add_header Retry-After 10 always; }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html { root /usr/share/nginx/html; internal; }
    }

