events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    charset utf-8;
    server_tokens off;

    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    output_buffers 1 32k;
    postpone_output 1460;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    client_max_body_size 25M;
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    limit_req_zone $binary_remote_addr zone=api:10m rate=15r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=crackguard:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=portfolio:10m rate=20r/s;

    limit_conn_zone $binary_remote_addr zone=addr:10m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/json
        application/ld+json
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;
    gzip_proxied any;
    gzip_disable "msie6";

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    map $scheme $proxy_x_forwarded_ssl {
        default off;
        https on;
    }

    # ═══════════════════════════════════════════════════════════════
    # UPSTREAMS - SISTEMA TOURS
    # ═══════════════════════════════════════════════════════════════

    upstream backend_servers {
        server backend:8080 max_fails=3 fail_timeout=30s;
        keepalive 64;
        keepalive_timeout 60s;
        keepalive_requests 1000;
    }

    upstream frontend_servers {
        server frontend-container:80 max_fails=3 fail_timeout=30s;
        keepalive 64;
        keepalive_timeout 60s;
    }

    upstream paginawebbtour_servers {
        server paginawebbtour-container:80 max_fails=3 fail_timeout=30s;
        keepalive 64;
        keepalive_timeout 60s;
    }

    # ═══════════════════════════════════════════════════════════════
    # UPSTREAMS - CRACKGUARD
    # ═══════════════════════════════════════════════════════════════

    upstream crackguard_backend {
        server crackguard-backend:5000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream crackguard_frontend {
        server crackguard-frontend:80 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ═══════════════════════════════════════════════════════════════
    # UPSTREAMS - PORTAFOLIO
    # ═══════════════════════════════════════════════════════════════

    upstream portfolio_servers {
        server 172.17.0.1:8081 max_fails=3 fail_timeout=30s;
        keepalive 32;
        keepalive_timeout 60s;
    }

    # ═══════════════════════════════════════════════════════════════
    # UPSTREAMS - HOTELFLUX
    # ═══════════════════════════════════════════════════════════════

    upstream hotelflux_backend {
        server hotelflux_core_backend:4000 max_fails=3 fail_timeout=30s;
        keepalive 64;
        keepalive_timeout 60s;
        keepalive_requests 1000;
    }

    upstream hotelflux_frontend_personal {
        server hotelflux_core_frontend_personal:8080 max_fails=3 fail_timeout=30s;
        keepalive 64;
        keepalive_timeout 60s;
    }

    upstream hotelflux_frontend_cliente {
        server hotelflux_core_frontend_cliente:8080 max_fails=3 fail_timeout=30s;
        keepalive 64;
        keepalive_timeout 60s;
    }

    # ═══════════════════════════════════════════════════════════════
    # SSL/TLS CONFIGURATION
    # ═══════════════════════════════════════════════════════════════

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ═══════════════════════════════════════════════════════════════
    # HTTP → HTTPS REDIRECTS
    # ═══════════════════════════════════════════════════════════════

    server {
        listen 80;
        listen [::]:80;
        server_name admin.angelproyect.com www.admin.angelproyect.com;

        location /health {
            access_log off;
            return 200 "nginx-admin-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://admin.angelproyect.com$request_uri;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name reservas.angelproyect.com www.reservas.angelproyect.com;

        location /health {
            access_log off;
            return 200 "nginx-reservas-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://reservas.angelproyect.com$request_uri;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name crackguard.angelproyect.com www.crackguard.angelproyect.com;

        location /health {
            access_log off;
            return 200 "nginx-crackguard-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://crackguard.angelproyect.com$request_uri;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name stream.angelproyect.com www.stream.angelproyect.com;

        location /health {
            access_log off;
            return 200 "nginx-stream-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://stream.angelproyect.com$request_uri;
        }
    }

    # ✅ Redirect HTTP → HTTPS portafolio
    server {
        listen 80;
        listen [::]:80;
        server_name portafolio.angelproyect.com www.portafolio.angelproyect.com;

        location /health {
            access_log off;
            return 200 "nginx-portafolio-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://portafolio.angelproyect.com$request_uri;
        }
    }

    # ── HOTELFLUX redirects HTTP → HTTPS ──
    server {
        listen 80;
        listen [::]:80;
        server_name reactiva-personal.angelproyect.com www.reactiva-personal.angelproyect.com;

        location /health {
            access_log off;
            return 200 "nginx-hotelflux-personal-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://reactiva-personal.angelproyect.com$request_uri;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name program-react.angelproyect.com www.program-react.angelproyect.com;

        location /health {
            access_log off;
            return 200 "nginx-hotelflux-cliente-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://program-react.angelproyect.com$request_uri;
        }
    }
    # ═══════════════════════════════════════════════════════════════

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location / {
            return 301 https://admin.angelproyect.com$request_uri;
        }
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS - ADMIN.ANGELPROYECT.COM
    # ═══════════════════════════════════════════════════════════════

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name admin.angelproyect.com www.admin.angelproyect.com;

        ssl_certificate /etc/nginx/certs/domain.cert.pem;
        ssl_certificate_key /etc/nginx/certs/private.key.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        limit_conn addr 50;

        location /health {
            access_log off;
            return 200 "admin-https-healthy\n";
            add_header Content-Type text/plain;
        }

        location ~ ^/api/v1/(auth/login|clientes/login) {
            limit_req zone=login burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://backend_servers;
            proxy_http_version 1.1;

            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Ssl $proxy_x_forwarded_ssl;

            add_header Access-Control-Allow-Origin "https://admin.angelproyect.com" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age "3600" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://admin.angelproyect.com" always;
                add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age "3600" always;
                add_header Content-Type "text/plain" always;
                add_header Content-Length 0 always;
                return 204;
            }

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;
        }

        location /api/v1/ {
            limit_req zone=api burst=30 nodelay;
            limit_req_status 429;

            proxy_pass http://backend_servers;
            proxy_http_version 1.1;

            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            add_header Access-Control-Allow-Origin "https://admin.angelproyect.com" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://admin.angelproyect.com" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age "3600" always;
                add_header Content-Type "text/plain" always;
                add_header Content-Length 0 always;
                return 204;
            }

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 16 32k;
            proxy_busy_buffers_size 64k;
        }

        location / {
            proxy_pass http://frontend_servers;
            proxy_http_version 1.1;

            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://frontend_servers;
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        error_page 404 = @admin_fallback;
        location @admin_fallback {
            proxy_pass http://frontend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

