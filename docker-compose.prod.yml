# ═══════════════════════════════════════════════════════════
# HotelFlux — Docker Compose PRODUCCIÓN (VPS) v4
# Uso:
#   docker compose -f docker-compose.prod.yml --profile default up -d
#   docker compose -f docker-compose.prod.yml --profile default --profile obs up -d
#   docker compose -f docker-compose.prod.yml --profile init up backend-init
#
# Antes de desplegar:
#   1. Copiar .env.example → .env y completar secretos reales
#   2. Configurar dominio en PHX_HOST
#   3. Montar certificados SSL en Nginx (o usar Traefik/Caddy)
# ═══════════════════════════════════════════════════════════

name: hotelflux-prod

x-restart: &restart_policy
  restart: always

x-logging: &logging_defaults
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"
    labels: "service,environment"

x-security: &security_defaults
  security_opt:
    - no-new-privileges:true
  init: true

services:

  # ── PostgreSQL 18 (producción) ─────────────────────────
  postgres:
    <<: [*restart_policy, *security_defaults]
    image: postgres:18-alpine
    container_name: hotelflux_prod_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hotelflux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definir POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:-hotelflux_prod}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - pgdata_prod:/var/lib/postgresql
      - pgconf_prod:/etc/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotelflux} -d ${POSTGRES_DB:-hotelflux_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    logging: *logging_defaults
    networks:
      - hotelflux_prod

  # ── Redis 8 (producción con persistencia) ──────────────
  redis:
    <<: [*restart_policy, *security_defaults]
    image: redis:8-alpine
    container_name: hotelflux_prod_redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Definir REDIS_PASSWORD en .env}
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:?Definir REDIS_PASSWORD en .env}
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
    logging: *logging_defaults
    networks:
      - hotelflux_prod

  # ── Backend init: corre migraciones (one-shot, profile: init) ──
  backend-init:
    <<: [*security_defaults]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: hotelflux_prod_backend_init
    command: ["./bin/hotelflux", "eval", "HotelFlux.Release.migrate()"]
    environment:
      DATABASE_URL:    ecto://${POSTGRES_USER:-hotelflux}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hotelflux_prod}
      REDIS_URL:       redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Definir SECRET_KEY_BASE en .env (mín 64 chars)}
      GUARDIAN_SECRET: ${GUARDIAN_SECRET:?Definir GUARDIAN_SECRET en .env}
      PHX_HOST:        ${PHX_HOST:-hotelflux.example.com}
      MIX_ENV:         prod
      RELEASE_COOKIE:  ${RELEASE_COOKIE:-hotelflux_erlang_cookie_prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: "no"
    profiles: ["init"]
    logging: *logging_defaults
    networks:
      - hotelflux_prod

  # ── Backend Elixir/Phoenix (producción) ─────────────────
  backend:
    <<: [*restart_policy, *security_defaults]
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: hotelflux_prod_backend
    environment:
      DATABASE_URL:    ecto://${POSTGRES_USER:-hotelflux}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hotelflux_prod}
      REDIS_URL:       redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Definir SECRET_KEY_BASE en .env (mín 64 chars)}
      GUARDIAN_SECRET: ${GUARDIAN_SECRET:?Definir GUARDIAN_SECRET en .env}
      PHX_HOST:        ${PHX_HOST:-hotelflux.example.com}
      PORT:            "4000"
      MIX_ENV:         prod
      POOL_SIZE:       "15"
      RELEASE_COOKIE:  ${RELEASE_COOKIE:-hotelflux_erlang_cookie_prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
        reservations:
          memory: 256M
    logging: *logging_defaults
    labels:
      com.hotelflux.service: "backend"
      com.hotelflux.environment: "production"
    networks:
      - hotelflux_prod

  # ── Frontend Personal (staff panel) ────────────────────
  frontend-personal:
    <<: [*restart_policy, *security_defaults]
    build:
      context: ./frontend-personal
      dockerfile: Dockerfile
      target: runtime
    container_name: hotelflux_prod_frontend_personal
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 32M
    logging: *logging_defaults
    networks:
      - hotelflux_prod

  # ── Frontend Cliente (guest portal) ────────────────────
  frontend-cliente:
    <<: [*restart_policy, *security_defaults]
    build:
      context: ./frontend-cliente
      dockerfile: Dockerfile
      target: runtime
    container_name: hotelflux_prod_frontend_cliente
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 32M
    logging: *logging_defaults
    networks:
      - hotelflux_prod

  # ── Nginx (reverse proxy + SSL + WebSocket) ────────────
  nginx:
    <<: [*restart_policy, *security_defaults]
    image: nginx:1.27-alpine
    container_name: hotelflux_prod_nginx
    ports:
      - "80:80"
      - "8080:8080"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Descomentar para SSL (Let's Encrypt / certbot):
      # - ./nginx/ssl:/etc/nginx/ssl:ro
      # - ./certbot/www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend-personal:
        condition: service_healthy
      frontend-cliente:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/nginx_status"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging: *logging_defaults
    networks:
      - hotelflux_prod

  # ── Alertmanager (alertas) — profile: obs ───────────────
  alertmanager:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: prom/alertmanager:v0.28.1
    container_name: hotelflux_prod_alertmanager
    user: "65534:65534"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9093/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging: *logging_defaults
    networks:
      - hotelflux_prod

  # ── OpenTelemetry Collector (trazas) — profile: obs ────
  otel-collector:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: hotelflux_prod_otel_collector
    user: "10001:10001"
    command:
      - '--config=/etc/otel/config.yml'
    volumes:
      - ./infra/otel-collector/otel-collector.yml:/etc/otel/config.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8888/metrics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *logging_defaults
    networks:
      - hotelflux_prod

  # ── Prometheus (métricas) — profile: obs ───────────────
  prometheus:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: prom/prometheus:v2.52.0
    container_name: hotelflux_prod_prometheus
    user: "65534:65534"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=1GB'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./infra/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheus_data:/prometheus
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
    logging: *logging_defaults
    networks:
      - hotelflux_prod

  # ── Grafana (dashboards) — profile: obs ────────────────
  grafana:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: grafana/grafana:11.1.0
    container_name: hotelflux_prod_grafana
    user: "472:472"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Definir GRAFANA_PASSWORD en .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_SERVER_ROOT_URL: "https://${PHX_HOST:-localhost}"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_SECURITY_CONTENT_TYPE_PROTECTION: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SNAPSHOTS_EXTERNAL_ENABLED: "false"
      GF_LOG_LEVEL: warn
      GF_LOG_MODE: console
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
    logging: *logging_defaults
    networks:
      - hotelflux_prod

  # ── Loki (logs) — profile: obs ─────────────────────────
  loki:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: grafana/loki:3.3.2
    container_name: hotelflux_prod_loki
    user: "10001:10001"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *logging_defaults
    networks:
      - hotelflux_prod

  # ── Promtail (log shipper) — profile: obs ──────────────
  promtail:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: grafana/promtail:3.3.2
    container_name: hotelflux_prod_promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging: *logging_defaults
    networks:
      - hotelflux_prod

  # ── PostgreSQL Exporter — profile: obs ─────────────────
  postgres-exporter:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
    container_name: hotelflux_prod_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-hotelflux}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hotelflux_prod}?sslmode=disable"
      PG_EXPORTER_EXCLUDE_DATABASES: "template0,template1"
      PG_EXPORTER_INCLUDE_DATABASES: "${POSTGRES_DB:-hotelflux_prod}"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    logging: *logging_defaults
    networks:
      - hotelflux_prod

  # ── Redis Exporter — profile: obs ──────────────────────
  redis-exporter:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: oliver006/redis_exporter:v1.61.0
    container_name: hotelflux_prod_redis_exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    logging: *logging_defaults
    networks:
      - hotelflux_prod

  # ── Node Exporter (métricas de host) — profile: obs ────
  node-exporter:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: prom/node-exporter:v1.9.1
    container_name: hotelflux_prod_node_exporter
    user: "65534:65534"
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
    volumes:
      - /:/host:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging: *logging_defaults
    networks:
      - hotelflux_prod

  # ── cAdvisor (métricas de contenedores) — profile: obs ─
  cadvisor:
    <<: [*restart_policy, *security_defaults]
    profiles: ["obs"]
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: hotelflux_prod_cadvisor
    user: "65534:65534"
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *logging_defaults
    networks:
      - hotelflux_prod

volumes:
  pgdata_prod:
    driver: local
  pgconf_prod:
    driver: local
  redisdata_prod:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  alertmanager_data:
    driver: local

networks:
  hotelflux_prod:
    driver: bridge
    name: hotelflux_prod
