# ═══════════════════════════════════════════════════════════
# HotelFlux — Docker Compose PRODUCCIÓN (VPS)
# Uso: docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────
# IMPORTANTE: Antes de desplegar en producción:
# 1. Copiar .env.example → .env y configurar secretos reales
# 2. Configurar dominio en PHX_HOST y NGINX
# 3. Montar certificados SSL en Nginx (o usar Traefik/Caddy)
# ═══════════════════════════════════════════════════════════

services:
  # ── PostgreSQL 18 (producción) ──
  postgres:
    image: postgres:18-alpine
    container_name: hotelflux_prod_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hotelflux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definir POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:-hotelflux_prod}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotelflux}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - hotelflux_prod

  # ── Redis 8 (producción con persistencia) ──
  redis:
    image: redis:8-alpine
    container_name: hotelflux_prod_redis
    restart: always
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:?Definir REDIS_PASSWORD en .env}
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - hotelflux_prod

  # ── Backend Elixir/Phoenix (producción) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotelflux_prod_backend
    restart: always
    environment:
      DATABASE_URL: ecto://${POSTGRES_USER:-hotelflux}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hotelflux_prod}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Definir SECRET_KEY_BASE en .env (mín 64 chars)}
      GUARDIAN_SECRET: ${GUARDIAN_SECRET:?Definir GUARDIAN_SECRET en .env}
      PHX_HOST: ${PHX_HOST:-hotelflux.example.com}
      PORT: "4000"
      MIX_ENV: prod
      POOL_SIZE: "15"
      RELEASE_COOKIE: ${RELEASE_COOKIE:-hotelflux_erlang_cookie_prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.5'
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
    labels:
      com.hotelflux.service: "backend"
      com.hotelflux.environment: "production"
    networks:
      - hotelflux_prod

  # ── Frontend React (producción) ──
  frontend:
    build:
      context: ./frontend-reception
      dockerfile: Dockerfile
      target: runtime
    container_name: hotelflux_prod_frontend
    restart: always
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=32m
      - /var/run:size=4m
      - /tmp:size=16m
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - hotelflux_prod

  # ── Nginx (reverse proxy + SSL + WebSocket) ──
  nginx:
    image: nginx:1.27-alpine
    container_name: hotelflux_prod_nginx
    restart: always
    ports:
      - "80:80"
      - "8080:8080"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Descomentar para SSL (Let's Encrypt / certbot):
      # - ./nginx/ssl:/etc/nginx/ssl:ro
      # - ./certbot/www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend-personal:
        condition: service_started
      frontend-cliente:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=64m
      - /var/run:size=4m
      - /tmp:size=16m
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - hotelflux_prod

  # ── Prometheus (métricas) ──
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: hotelflux_prod_prometheus
    restart: always
    user: "65534:65534"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=1GB'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./infra/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheus_data:/prometheus
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - hotelflux_prod

  # ── Grafana (dashboards de monitoreo) ──
  grafana:
    image: grafana/grafana:11.1.0
    container_name: hotelflux_prod_grafana
    restart: always
    user: "472:472"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-HotelFlux2026!}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_SERVER_ROOT_URL: "http://${PHX_HOST:-localhost}:3001"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_SECURITY_CONTENT_TYPE_PROTECTION: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_SNAPSHOTS_EXTERNAL_ENABLED: "false"
      GF_LOG_LEVEL: warn
      GF_LOG_MODE: console
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - hotelflux_prod

  # ── Loki (agregación de logs) ──
  loki:
    image: grafana/loki:3.3.2
    container_name: hotelflux_prod_loki
    restart: always
    user: "10001:10001"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - hotelflux_prod

  # ── Promtail (recolector de logs → Loki) ──
  promtail:
    image: grafana/promtail:3.3.2
    container_name: hotelflux_prod_promtail
    restart: always
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - hotelflux_prod

  # ── PostgreSQL Exporter ──
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: hotelflux_prod_postgres_exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-hotelflux}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hotelflux_prod}?sslmode=disable"
      PG_EXPORTER_EXCLUDE_DATABASES: "template0,template1"
      PG_EXPORTER_INCLUDE_DATABASES: "${POSTGRES_DB:-hotelflux_prod}"
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - hotelflux_prod

  # ── Redis Exporter ──
  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: hotelflux_prod_redis_exporter
    restart: always
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      - redis
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - hotelflux_prod

volumes:
  pgdata_prod:
    driver: local
  redisdata_prod:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  hotelflux_prod:
    driver: bridge
