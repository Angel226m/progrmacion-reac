# ═══════════════════════════════════════════════════════════
# HotelFlux — Docker Compose PRODUCCIÓN (VPS)
# Uso: docker compose -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────
# IMPORTANTE: Antes de desplegar en producción:
# 1. Copiar .env.example → .env y configurar secretos reales
# 2. Configurar dominio en PHX_HOST y NGINX
# 3. Montar certificados SSL en Nginx (o usar Traefik/Caddy)
# ═══════════════════════════════════════════════════════════

services:
  # ── PostgreSQL 18 (producción) ──
  postgres:
    image: postgres:18-alpine
    container_name: hotelflux_prod_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hotelflux}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definir POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:-hotelflux_prod}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotelflux}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    networks:
      - hotelflux_prod
    # NO exponer puerto 5432 al host en producción
    # ports: ["5432:5432"]

  # ── Redis 8 (producción con persistencia) ──
  redis:
    image: redis:8-alpine
    container_name: hotelflux_prod_redis
    restart: always
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD:?Definir REDIS_PASSWORD en .env}
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - hotelflux_prod

  # ── Backend Elixir/Phoenix (producción) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotelflux_prod_backend
    restart: always
    environment:
      DATABASE_URL: ecto://${POSTGRES_USER:-hotelflux}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hotelflux_prod}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Definir SECRET_KEY_BASE en .env (mín 64 chars)}
      GUARDIAN_SECRET: ${GUARDIAN_SECRET:?Definir GUARDIAN_SECRET en .env}
      PHX_HOST: ${PHX_HOST:-hotelflux.example.com}
      PORT: "4000"
      MIX_ENV: prod
      POOL_SIZE: "15"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.5'
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - hotelflux_prod

  # ── Frontend React (producción) ──
  frontend:
    build:
      context: ./frontend-reception
      dockerfile: Dockerfile
    container_name: hotelflux_prod_frontend
    restart: always
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - hotelflux_prod

  # ── Nginx (reverse proxy + SSL + WebSocket) ──
  nginx:
    image: nginx:alpine
    container_name: hotelflux_prod_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Descomentar para SSL (Let's Encrypt / certbot):
      # - ./nginx/ssl:/etc/nginx/ssl:ro
      # - ./certbot/www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - hotelflux_prod

  # ── Prometheus (métricas) ──
  prometheus:
    image: prom/prometheus:latest
    container_name: hotelflux_prod_prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=1GB'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - hotelflux_prod

  # ── Grafana (dashboards de monitoreo) ──
  grafana:
    image: grafana/grafana:latest
    container_name: hotelflux_prod_grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-HotelFlux2026!}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://${PHX_HOST:-localhost}:3001"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - hotelflux_prod

  # ── Loki (agregación de logs) ──
  loki:
    image: grafana/loki:3.3.2
    container_name: hotelflux_prod_loki
    restart: always
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - hotelflux_prod

  # ── Promtail (recolector de logs → Loki) ──
  promtail:
    image: grafana/promtail:3.3.2
    container_name: hotelflux_prod_promtail
    restart: always
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infra/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - hotelflux_prod

volumes:
  pgdata_prod:
    driver: local
  redisdata_prod:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  hotelflux_prod:
    driver: bridge
